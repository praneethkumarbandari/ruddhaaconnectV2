<title>About</title>
<script>
            (function () {
                try {
                    const cached = localStorage.getItem("portalTheme");
                    if (cached) {
                        const t = JSON.parse(cached);
                        if (t.primary_color)
                            document.documentElement.style.setProperty(
                                "--primary-color",
                                t.primary_color,
                            );
                        if (t.secondary_color)
                            document.documentElement.style.setProperty(
                                "--secondary-color",
                                t.secondary_color,
                            );
                        if (t.background_color)
                            document.documentElement.style.setProperty(
                                "--background-color",
                                t.background_color,
                            );
                        if (t.font_family)
                            document.documentElement.style.setProperty(
                                "--font-family",
                                t.font_family,
                            );
                    }
                } catch (e) {}
            })();
        </script>
<script src="/js/theme-boot.js"></script>

<body>


            <main class="main">
                <div class="content-box">
                    <h1 class="page-title">About</h1>
                    <p class="page-subtitle">About RuddhaaConnect</p>
                </div>

                <div class="content-box">
                    <div class="empty-state">
                        <div class="empty-state-icon">ℹ️</div>
                        <h3 class="empty-state-title">About RuddhaaConnect</h3>
                        <p class="empty-state-message">Information about this application and version details will appear here.</p>
                    </div>
                    <table class="data-table" id="AboutBodyTable" style="display:none;width:100%;margin-top:16px;">
                        <thead><tr id="AboutBodyHead"></tr></thead>
                        <tbody id="AboutBody"></tbody>
                    </table>
                </div>
            </main>
        </div>

        
<script>
            function toggleGroup(el) {
                const sub = el.nextElementSibling;
                if (sub && sub.classList.contains("nav-sub")) {
                    sub.classList.toggle("open");
                    el.querySelector(".nav-arrow").style.transform = sub.classList.contains("open")
                        ? "rotate(180deg)"
                        : "none";
                }
            }

            function closeSidebar() {
                document.getElementById("sidebar").classList.remove("open");
                document.getElementById("sidebarOverlay").classList.remove("open");
            }

            function logout() {
                localStorage.removeItem("rc_token");
                localStorage.removeItem("rc_user");
                localStorage.removeItem("loggedEmployee");
                localStorage.removeItem("authToken");
                localStorage.removeItem("userData");
                window.location.href = "business-login.html";
            }

            // Load theme and company info
            async function initPage() {
                try {
                    // Check session
                    const sessionData = localStorage.getItem("loggedEmployee");
                    
                    if (!sessionData) {
                        console.log("Redirecting to login...");
                        window.location.href = "business-login.html";
                        return;
                    }

                    const userData = JSON.parse(sessionData);
                    
                    if (!userData || !userData.employee_id) {
                        console.error("❌ Invalid session data");
                        window.location.href = "business-login.html";
                        return;
                    }
                    (function(){var el=document.getElementById("employeeName");if(el)el.textContent=userData.employeeName || userData.username || "—";})();
                    (function(){var el=document.getElementById("employeeMeta");if(el)el.textContent=userData.department || "—";})();

                    // Load company logo
                    if (userData.companyLogo) {
                        document.getElementById("companyLogo").src = userData.companyLogo;
                    }
                } catch (e) {
                    console.error("❌ Init error:", e);
                    window.location.href = "business-login.html";
                }
            }

            (function(){var el=document.getElementById("sidebarToggle");if(el)el.addEventListener("click", () => {
                const sidebar = document.getElementById("sidebar");
                const overlay = document.getElementById("sidebarOverlay");
                sidebar.classList.toggle("open");
                overlay.classList.toggle("open");
            });})();

            initPage();
        </script>
