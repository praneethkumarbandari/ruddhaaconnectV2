<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers</title>
<script>(function(){try{const t=JSON.parse(localStorage.getItem('portalTheme')||'{}');if(t.primary_color)document.documentElement.style.setProperty('--primary-color',t.primary_color);if(t.secondary_color)document.documentElement.style.setProperty('--secondary-color',t.secondary_color);if(t.background_color)document.documentElement.style.setProperty('--background-color',t.background_color);if(t.font_family)document.documentElement.style.setProperty('--font-family',t.font_family);}catch(e){}}());</script>
<script src="/js/theme-boot.js"></script>
<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/forms.css">
<link rel="stylesheet" href="/css/modals.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/responsive.css">
<style>
body{padding:24px;box-sizing:border-box;background:var(--background-color,#f5f7fb);}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.page-header h2{margin:0;}
.action-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
.action-bar-left{display:flex;gap:10px;}
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e2e6ee;border-radius:8px;padding:8px 12px;min-width:260px;}
.search-box input{border:none;outline:none;flex:1;font-size:13px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:18px;}
.summary-card{background: var(--card-color, #fff); backdrop-filter: blur(var(--card-blur, 16px)); -webkit-backdrop-filter: blur(var(--card-blur, 16px));border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);padding:14px 18px;}
.summary-card h4{margin:0 0 6px;font-size:11px;text-transform:uppercase;color:#8a93a6;letter-spacing:.4px;}
.summary-card .s-val{font-size:22px;font-weight:700;color:#1a2233;}
.table-wrap{background: var(--card-color, #fff); backdrop-filter: blur(var(--card-blur, 16px)); -webkit-backdrop-filter: blur(var(--card-blur, 16px));border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;color:#8a93a6;background:#f7f9fc;border-bottom:1px solid #e2e6ee;}
td{padding:10px 12px;border-bottom:1px solid #f0f2f6;}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.badge.success{background:#d4edda;color:#155724;}
.badge.warning{background:#fff3cd;color:#856404;}
.state-box{text-align:center;padding:40px;color:#aaa;}
</style>
</head>
<body>

<div class="main" id="mainContent">
  <div class="page-header"><h2>Customers <span id="totalBadge" style="font-size:14px;font-weight:400;color:#777;"></span></h2></div>

  <div class="action-bar">
    <div class="action-bar-left">
      <button class="btn-primary" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> Add Customer</button>
      <button class="btn-secondary" onclick="loadCustomers()"><i class="fa-solid fa-arrows-rotate"></i> Refresh</button>
    </div>
    <div class="search-box">🔍<input type="text" id="searchInput" placeholder="Search name, GSTIN, email, phone…" oninput="applySearch()"></div>
  </div>

  <div class="summary-grid">
    <div class="summary-card"><h4>Total Customers</h4><div class="s-val" id="cntTotal">—</div></div>
    <div class="summary-card"><h4>Active</h4><div class="s-val" id="cntActive">—</div></div>
    <div class="summary-card"><h4>Inactive</h4><div class="s-val" id="cntInactive">—</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Email</th><th>City</th><th>GSTIN</th><th>Supply Type</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="customersBody"><tr><td colspan="9" class="state-box">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="customerModal">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">Add Customer</h3><button class="modal-header-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i> </button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="field"><label>Name *</label><input type="text" id="fName"></div>
      <div class="field"><label>Registration Type *</label>
        <select id="fRegType" onchange="toggleGstFields()">
          <option value="registered">Registered (has GSTIN)</option>
          <option value="unregistered">Unregistered</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field"><label>Email</label><input type="email" id="fEmail"></div>
        <div class="field"><label>Phone</label><input type="text" id="fPhone" placeholder="+91 XXXXX XXXXX"></div>
      </div>
      <div class="field-row" id="gstFieldsRow">
        <div class="field"><label>GSTIN *</label><input type="text" id="fGstin" placeholder="22AAAAA0000A1Z5"></div>
        <div class="field"><label>Supply Type *</label>
          <select id="fSupplyType"><option value="intrastate">Intrastate (CGST+SGST)</option><option value="interstate">Interstate (IGST)</option></select>
        </div>
      </div>
      <div class="field"><label>Address Line 1</label><input type="text" id="fAddr1"></div>
      <div class="field"><label>Address Line 2</label><input type="text" id="fAddr2"></div>
      <div class="field-row three">
        <div class="field"><label>City</label><input type="text" id="fCity"></div>
        <div class="field"><label>State</label><input type="text" id="fState"></div>
        <div class="field"><label>Pincode</label><input type="text" id="fPincode"></div>
      </div>
      <p id="modalMsg" style="color:#c0392b;font-size:13px;"></p>
    </div>
    <div class="modal-footer"><button class="btn-primary" onclick="saveCustomer()">Save</button></div>
  </div>
</div>

<script>
let allCustomers = [];

window.addEventListener('DOMContentLoaded', function(){
  if (!window.Auth || !window.Auth.isAuthenticated()) { if(window.Auth) window.Auth.checkAuth(); return; }
  loadCustomers();
});

async function loadCustomers(){
  const body = document.getElementById('customersBody');
  body.innerHTML = '<tr><td colspan="9" class="state-box">Loading…</td></tr>';
  try {
    allCustomers = await window.Api.get('/customers');
    document.getElementById('totalBadge').textContent = allCustomers.length + ' total';
    document.getElementById('cntTotal').textContent = allCustomers.length;
    document.getElementById('cntActive').textContent = allCustomers.filter(c=>c.is_active!==false).length;
    document.getElementById('cntInactive').textContent = allCustomers.filter(c=>c.is_active===false).length;
    renderTable(allCustomers);
  } catch(e) {
    body.innerHTML = '<tr><td colspan="9" class="state-box">Could not load customers: '+(e.message||'')+'</td></tr>';
  }
}

function renderTable(rows){
  const body = document.getElementById('customersBody');
  if (!rows.length) { body.innerHTML = '<tr><td colspan="9" class="state-box">No customers found.</td></tr>'; return; }
  body.innerHTML = rows.map((r,i)=>`<tr>
    <td>${i+1}</td>
    <td><strong>${escapeHtml(r.customer_name)||'—'}</strong></td>
    <td>${escapeHtml(r.phone)||'—'}</td>
    <td>${escapeHtml(r.email)||'—'}</td>
    <td>${escapeHtml(r.city)||'—'}</td>
    <td>${escapeHtml(r.gstin)||'—'}</td>
    <td>${r.supply_type||'—'}</td>
    <td><span class="badge ${r.is_active===false?'warning':'success'}">${r.is_active===false?'Inactive':'Active'}</span></td>
    <td><button class="btn-secondary" onclick='openEditModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'><i class="fa-solid fa-pen"></i> Edit</button></td>
  </tr>`).join('');
}

function applySearch(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderTable(allCustomers.filter(r => !q ||
    (r.customer_name||'').toLowerCase().includes(q) ||
    (r.gstin||'').toLowerCase().includes(q) ||
    (r.email||'').toLowerCase().includes(q) ||
    (r.phone||'').toLowerCase().includes(q)));
}

function clearForm(){
  ['fName','fEmail','fPhone','fGstin','fAddr1','fAddr2','fCity','fState','fPincode'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fSupplyType').value='intrastate';
  document.getElementById('editId').value='';
  document.getElementById('modalMsg').textContent='';
}
function toggleGstFields(){
  const registered = document.getElementById('fRegType').value === 'registered';
  document.getElementById('gstFieldsRow').style.display = registered ? 'flex' : 'none';
}
function openAddModal(){
  clearForm();
  document.getElementById('modalTitle').textContent='Add Customer';
  document.getElementById('fRegType').value='registered';
  toggleGstFields();
  document.getElementById('customerModal').classList.add('active');
}
function openEditModal(c){
  clearForm();
  document.getElementById('modalTitle').textContent='Edit Customer';
  document.getElementById('editId').value=c.id;
  document.getElementById('fName').value=c.customer_name||'';
  document.getElementById('fEmail').value=c.email||'';
  document.getElementById('fPhone').value=c.phone||'';
  document.getElementById('fRegType').value = c.gstin ? 'registered' : 'unregistered';
  document.getElementById('fGstin').value=c.gstin||'';
  document.getElementById('fSupplyType').value=c.supply_type||'intrastate';
  document.getElementById('fAddr1').value=c.address_line1||'';
  document.getElementById('fAddr2').value=c.address_line2||'';
  document.getElementById('fCity').value=c.city||'';
  document.getElementById('fState').value=c.state||'';
  document.getElementById('fPincode').value=c.pincode||'';
  toggleGstFields();
  document.getElementById('customerModal').classList.add('active');
}
function closeModal(){ document.getElementById('customerModal').classList.remove('active'); }

async function saveCustomer(){
  const id = document.getElementById('editId').value;
  const registered = document.getElementById('fRegType').value === 'registered';
  const payload = {
    customerName: document.getElementById('fName').value.trim(),
    email: document.getElementById('fEmail').value.trim()||null,
    phone: document.getElementById('fPhone').value.trim()||null,
    gstin: registered ? (document.getElementById('fGstin').value.trim()||null) : null,
    supplyType: registered ? document.getElementById('fSupplyType').value : 'intrastate',
    addressLine1: document.getElementById('fAddr1').value.trim()||null,
    addressLine2: document.getElementById('fAddr2').value.trim()||null,
    city: document.getElementById('fCity').value.trim()||null,
    state: document.getElementById('fState').value.trim()||null,
    pincode: document.getElementById('fPincode').value.trim()||null,
  };
  if (!payload.customerName) { document.getElementById('modalMsg').textContent='Customer name is required.'; return; }
  if (registered && !payload.gstin) { document.getElementById('modalMsg').textContent='GSTIN is required for a registered customer.'; return; }
  try {
    if (id) await window.Api.patch('/customers/'+id, payload);
    else await window.Api.post('/customers', payload);
    closeModal();
    loadCustomers();
  } catch(e) {
    document.getElementById('modalMsg').textContent = 'Failed to save: '+(e.message||'Unknown error');
  }
}
function logout(){ window.Auth.logout(); }
</script>
<script src="/js/config.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/escape-html.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
