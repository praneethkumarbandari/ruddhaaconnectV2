<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Follow-ups</title>
<script>(function(){try{var t=JSON.parse(localStorage.getItem('portalTheme')||'{}');if(t.primary_color)document.documentElement.style.setProperty('--primary-color',t.primary_color);if(t.secondary_color)document.documentElement.style.setProperty('--secondary-color',t.secondary_color);if(t.background_color)document.documentElement.style.setProperty('--background-color',t.background_color);if(t.font_family)document.documentElement.style.setProperty('--font-family',t.font_family);}catch(e){}}());</script>
<script src="/js/theme-boot.js"></script>
<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/cards.css">
<link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/forms.css">
<link rel="stylesheet" href="/css/tables.css">
<link rel="stylesheet" href="/css/modals.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/responsive.css">
<style>body { padding: 24px; box-sizing: border-box; background: var(--background-color, #f5f7fb); }</style>
</head>
<body>
<div class="main" id="mainContent">
  <div class="page-header">
    <h2>CRM — Follow-ups</h2>
    <button class="btn-primary" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> Schedule Follow-up</button>
  </div>
  <!--
    NOTE: No backend route exists for CRM yet — this follows the same
    direct-Supabase pattern as Leads (crm_followups table), ready to
    swap for a real /api/crm/* backend later. Every follow-up is
    attached to an existing lead (crm_leads) via a dropdown lookup —
    this page never creates leads itself; use the Leads page for that.
  -->
  <div class="filter-bar">
    <select id="filterLead"><option value="">All Leads</option></select>
    <select id="filterStatus" onchange="applyFilter()">
      <option value="">All Status</option>
      <option value="pending">Pending</option>
      <option value="done">Done</option>
      <option value="missed">Missed</option>
    </select>
  </div>
  <div class="summary-grid">
    <div class="summary-card"><h4>Total</h4><div class="s-val" id="cntTotal">—</div></div>
    <div class="summary-card"><h4>Pending</h4><div class="s-val" id="cntPending">—</div></div>
    <div class="summary-card"><h4>Due Today</h4><div class="s-val" id="cntToday">—</div></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Lead</th><th>Due Date</th><th>Type</th><th>Notes</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="followupsBody"><tr><td colspan="7" class="empty-state">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="followupModal">
  <div class="modal">
    <div class="modal-header"><h3 id="followupModalTitle">Schedule Follow-up</h3><button class="modal-header-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i> </button></div>
    <div class="modal-body">
      <div class="msg-inline" id="followupModalMsg"></div>
      <div class="field"><label>Lead *</label><select id="fLead"><option value="">Select lead…</option></select></div>
      <div class="field"><label>Due Date *</label><input type="date" id="fDueDate"></div>
      <div class="field"><label>Type</label>
        <select id="fType"><option value="call">Call</option><option value="email">Email</option><option value="meeting">Meeting</option><option value="other">Other</option></select>
      </div>
      <div class="field"><label>Notes</label><textarea id="fNotes" placeholder="What needs to happen"></textarea></div>
      <div class="field"><label>Status</label>
        <select id="fStatus"><option value="pending">Pending</option><option value="done">Done</option><option value="missed">Missed</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveFollowup()">Save</button>
    </div>
  </div>
</div>

<script>
let allFollowups = [], leads = [], editId = null;

window.addEventListener('DOMContentLoaded', async function(){
    if (!window.Auth || !window.Auth.isAuthenticated()) {
        const stored = localStorage.getItem('loggedEmployee');
        if (!stored) { window.top.location.href = '/business-login.html'; return; }
    }
    const emp = window.Auth ? window.Auth.getEmployee() : JSON.parse(localStorage.getItem('loggedEmployee')||'null');
    if(emp){(function(){var el=document.getElementById('employeeName');if(el)el.textContent=emp.employeeName||emp.username||emp.name||'—';})();(function(){var el=document.getElementById('employeeMeta');if(el)el.textContent='—';})();}
    setupSidebar();
    await loadLeadLookup();
    await loadFollowups();
});

async function loadLeadLookup(){
    try {
        const leads_data = await window.Api.get('/crm/leads');
        leads = leads_data || [];
        const opts = leads.map(l=>`<option value="${l.id}">${l.lead_name}${l.company?' — '+l.company:''}</option>`).join('');
        document.getElementById('fLead').innerHTML = '<option value="">Select lead…</option>' + opts;
        document.getElementById('filterLead').innerHTML = '<option value="">All Leads</option>' + opts;
        document.getElementById('filterLead').addEventListener('change', applyFilter);
    } catch(e) { console.warn('Could not load leads lookup:', e.message); }
}
function leadLabel(id){ const l = leads.find(x=>String(x.id)===String(id)); return l ? escapeHtml(l.lead_name) : ('#'+id); }

async function loadFollowups(){
    try {
        const data = await window.Api.get('/crm/followups');
        allFollowups = data || [];
        renderTable(allFollowups);
        updateSummary(allFollowups);
    } catch(e) {
        document.getElementById('followupsBody').innerHTML = '<tr><td colspan="7" class="empty-state">No follow-ups yet, or the crm_followups table hasn\'t been created in this database yet.</td></tr>';
        updateSummary([]);
    }
}
function updateSummary(rows){
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('cntTotal').textContent = rows.length;
    document.getElementById('cntPending').textContent = rows.filter(r=>r.status==='pending').length;
    document.getElementById('cntToday').textContent = rows.filter(r=>r.due_date && String(r.due_date).slice(0,10)===today).length;
}
function renderTable(rows){
    const tbody = document.getElementById('followupsBody');
    if(!rows.length){ tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No follow-ups found.</td></tr>'; return; }
    tbody.innerHTML = rows.map((r,i)=>`<tr>
        <td>${i+1}</td>
        <td>${r.lead_id ? leadLabel(r.lead_id) : '—'}</td>
        <td>${r.due_date ? String(r.due_date).split('T')[0] : '—'}</td>
        <td>${r.followup_type||'—'}</td>
        <td>${escapeHtml(r.notes)||'—'}</td>
        <td><span class="badge ${r.status==='done'?'active':(r.status==='missed'?'inactive':'')}">${r.status||'—'}</span></td>
        <td><button class="action-btn" onclick='editRow(${JSON.stringify(r).replace(/'/g,"&#39;")})'><i class="fa-solid fa-pen"></i> </button></td>
    </tr>`).join('');
}
function applyFilter(){
    const leadId = document.getElementById('filterLead').value;
    const status = document.getElementById('filterStatus').value;
    let rows = allFollowups;
    if(leadId) rows = rows.filter(r=>String(r.lead_id)===leadId);
    if(status) rows = rows.filter(r=>r.status===status);
    renderTable(rows);
}
function openAddModal(){
    editId = null;
    document.getElementById('followupModalTitle').textContent = 'Schedule Follow-up';
    document.getElementById('fLead').value = '';
    document.getElementById('fDueDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('fType').value = 'call';
    document.getElementById('fNotes').value = '';
    document.getElementById('fStatus').value = 'pending';
    document.getElementById('followupModalMsg').textContent = '';
    document.getElementById('followupModal').classList.add('active');
}
function editRow(r){
    editId = r.id;
    document.getElementById('followupModalTitle').textContent = 'Edit Follow-up';
    document.getElementById('fLead').value = r.lead_id||'';
    document.getElementById('fDueDate').value = r.due_date ? String(r.due_date).split('T')[0] : '';
    document.getElementById('fType').value = r.followup_type||'call';
    document.getElementById('fNotes').value = r.notes||'';
    document.getElementById('fStatus').value = r.status||'pending';
    document.getElementById('followupModalMsg').textContent = '';
    document.getElementById('followupModal').classList.add('active');
}
function closeModal(){ document.getElementById('followupModal').classList.remove('active'); }
async function saveFollowup(){
    const payload = {
        leadId: document.getElementById('fLead').value || null,
        dueDate: document.getElementById('fDueDate').value,
        followupType: document.getElementById('fType').value,
        notes: document.getElementById('fNotes').value.trim() || null,
        status: document.getElementById('fStatus').value,
    };
    if(!payload.leadId || !payload.dueDate){
        document.getElementById('followupModalMsg').textContent = 'Lead and due date are required.';
        return;
    }
    try {
        if(editId){ await window.Api.patch('/crm/followups/' + editId, payload); }
        else { await window.Api.post('/crm/followups', payload); }
        if(window.Audit) window.Audit.log('crm_followups', editId||'new', editId?'UPDATE':'CREATE', null, {due_date: payload.dueDate});
        closeModal();
        loadFollowups();
    } catch(e) {
        document.getElementById('followupModalMsg').textContent = 'Could not save: '+(e.message||'Unknown error.')+(e.message||'the crm_followups table may not exist yet in this database.');
    }
}
function setupSidebar(){const toggle=document.getElementById('sidebarToggle'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');if(toggle&&sidebar)toggle.addEventListener('click',function(){if(window.innerWidth<=900){sidebar.classList.toggle('mobile-open');if(overlay)overlay.classList.toggle('active');}else{sidebar.classList.toggle('collapsed');document.getElementById('mainContent').classList.toggle('expanded');}});}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('sidebarOverlay').classList.remove('active');}
function logout(){ if(window.Auth) window.Auth.logout(); else { localStorage.removeItem('loggedEmployee'); window.top.location.href='/business-login.html'; } }
</script>
<script src="/js/config.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/escape-html.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/navigation.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/app.js"></script>
<script src="/js/audit.js"></script>
</body>
</html>
