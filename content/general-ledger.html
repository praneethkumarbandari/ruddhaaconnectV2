<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General Ledger</title>
<script>(function(){try{const t=JSON.parse(localStorage.getItem('portalTheme')||'{}');if(t.primary_color)document.documentElement.style.setProperty('--primary-color',t.primary_color);if(t.secondary_color)document.documentElement.style.setProperty('--secondary-color',t.secondary_color);if(t.background_color)document.documentElement.style.setProperty('--background-color',t.background_color);if(t.font_family)document.documentElement.style.setProperty('--font-family',t.font_family);}catch(e){}}());</script>
<script src="/js/theme-boot.js"></script>
        <link rel="stylesheet" href="/css/variables.css">
        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/layout.css">
        <link rel="stylesheet" href="/css/cards.css">
        <link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="/css/forms.css">
        <link rel="stylesheet" href="/css/tables.css">
        <link rel="stylesheet" href="/css/modals.css">
        <link rel="stylesheet" href="/css/utilities.css">
        <link rel="stylesheet" href="/css/responsive.css">
<style>body { padding: 24px; box-sizing: border-box; background: var(--background-color, #f5f7fb); }</style>
</head>
<body>
  <div class="main" id="mainContent">
    <div class="page-header"><h2>General Ledger</h2></div>
    <div class="filter-bar">
        <select id="fAccount" style="min-width:220px;">
          <option value="">All Accounts</option>
        </select>
        <label style="font-size:13px;font-weight:600;color:#555">From:</label>
        <input type="date" id="fFrom">
        <label style="font-size:13px;font-weight:600;color:#555">To:</label>
        <input type="date" id="fTo">
        <button class="btn-primary" onclick="loadData()">Generate</button>
    </div>
    <div id="reportArea"><div style="background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,0.08);padding:60px;text-align:center;color:#aaa;font-size:14px;">Loading…</div></div>
  </div>
</div>

<script>
let allLedgers = [];
function fmt(n){return parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}

window.addEventListener('DOMContentLoaded',async function(){
    if (!window.Auth.isAuthenticated()) { window.Auth.checkAuth(); return; }
    const emp = window.Auth.getEmployee();
    if(emp){(function(){var el=document.getElementById('employeeName');if(el)el.textContent=emp.employeeName||emp.username||'—';})();(function(){var el=document.getElementById('employeeMeta');if(el)el.textContent='—';})();}
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('fFrom').value = today.slice(0,8)+'01';
    document.getElementById('fTo').value = today;
    setupSidebar();
    try{
        // FIX (menu/UX restructure): General Ledger, Customer Ledger, and
        // Vendor Ledger used to be three separate pages showing three
        // overlapping views of the same underlying journal_entry_lines.
        // This is now the one place: /ledgers returns every real, named
        // ledger — ordinary COA accounts, customers, vendors, and bank
        // accounts alike — and loadData() below picks the right report
        // endpoint (account-based vs party-based) per selection, so a
        // customer's or vendor's own ledger is just one more option here
        // instead of a whole separate page duplicating this one.
        allLedgers = await window.Api.get('/ledgers');
        const sel = document.getElementById('fAccount');
        sel.innerHTML = '<option value="">All Ledgers</option>' + allLedgers.map((l,i)=>`<option value="${i}">${escapeHtml(l.label)}</option>`).join('');
    }catch(e){ /* dropdown just stays at "All Ledgers"; the generate button will show the real error */ }
    loadData();
});

async function loadData(){
    const area=document.getElementById('reportArea');
    const selectedIdx = document.getElementById('fAccount').value;
    const from = document.getElementById('fFrom').value;
    const to = document.getElementById('fTo').value;
    if(!from || !to){ alert('Both From and To dates are required.'); return; }
    area.innerHTML='<div style="background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,0.08);padding:60px;text-align:center;color:#aaa;font-size:14px;">Generating…</div>';

    const ledgersToShow = selectedIdx !== '' ? [allLedgers[Number(selectedIdx)]] : allLedgers;

    if(!ledgersToShow.length){
        area.innerHTML='<div style="background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,0.08);padding:60px;text-align:center;color:#aaa;font-size:14px;">No ledgers found.</div>';
        return;
    }

    try{
        // FIX (performance/scalability): this used to make one API call
        // PER LEDGER (Promise.all over every account/customer/vendor/
        // bank) — fine for a handful of ledgers, but thousands of round
        // trips at "thousands of customers". One call now fetches every
        // ledger's opening balance and movements at once; the loop below
        // just looks each one up in that single response.
        const batch = await window.Api.get('/reports/general-ledger-batch?fromDate='+encodeURIComponent(from)+'&toDate='+encodeURIComponent(to));

        function dataFor(ledger){
            if(ledger.kind === 'customer') return batch.byCustomerId[ledger.partyId] || null;
            if(ledger.kind === 'vendor') return batch.byVendorId[ledger.partyId] || null;
            // 'coa' and 'bank' both post against a plain chart_of_accounts code.
            return batch.byAccountCode[ledger.accountCode] || null;
        }

        const results = ledgersToShow.map((ledger) => ({ ledger, ledgerData: dataFor(ledger) }));

        area.innerHTML = results.map(({ledger, ledgerData}) => {
            if(!ledgerData){
                return `<div class="report-card" style="margin-bottom:16px;">
                    <div class="report-title">${escapeHtml(ledger.label)}</div>
                    <div style="color:#c0392b;font-size:13px;margin-top:8px;">No data found for this ledger.</div>
                </div>`;
            }
            const movements = ledgerData.movements || [];
            // Skip ledgers with zero opening AND zero movement when
            // showing everything — otherwise the full ledger list
            // renders dozens of empty sections nobody wants to scroll
            // past. A single ledger picked explicitly always shows.
            if(selectedIdx === '' && movements.length === 0 && Number(ledgerData.openingBalance) === 0 && Number(ledgerData.closingBalance) === 0){
                return '';
            }
            const rows = movements.map(m=>`<tr>
                <td>${new Date(m.entry_date).toLocaleDateString('en-IN')}</td>
                <td>${m.je_no}</td>
                <td>${escapeHtml(m.narration)||'—'}</td>
                <td class="debit-col">${Number(m.debit)>0?'₹'+fmt(m.debit):''}</td>
                <td class="credit-col">${Number(m.credit)>0?'₹'+fmt(m.credit):''}</td>
                <td>₹${fmt(m.running_balance)}</td>
            </tr>`).join('');
            return `<div class="report-card" style="margin-bottom:16px;">
                <div class="report-title">${escapeHtml(ledger.label)}</div>
                <div style="font-size:13px;color:#555;margin:6px 0;">Opening Balance: ₹${fmt(ledgerData.openingBalance)}</div>
                <table>
                    <thead><tr><th>Date</th><th>JE No.</th><th>Narration</th><th>Debit</th><th>Credit</th><th>Balance</th></tr></thead>
                    <tbody>${rows||'<tr><td colspan="6" class="empty-state">No movement in this range.</td></tr>'}</tbody>
                </table>
                <div style="font-size:13px;color:#555;margin-top:8px;font-weight:600;">Closing Balance: ₹${fmt(ledgerData.closingBalance)}</div>
            </div>`;
        }).join('') || '<div style="background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,0.08);padding:60px;text-align:center;color:#aaa;font-size:14px;">No ledgers with activity in this range.</div>';
    }catch(e){
        area.innerHTML='<div style="background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,0.08);padding:60px;text-align:center;color:#c0392b;font-size:14px;">Could not generate ledger: '+(e.message||'Unknown error')+'</div>';
    }
}
function setupSidebar(){const toggle=document.getElementById('sidebarToggle'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');if(toggle&&sidebar)toggle.addEventListener('click',function(){if(window.innerWidth<=900){sidebar.classList.toggle('mobile-open');if(overlay)overlay.classList.toggle('active');}else{sidebar.classList.toggle('collapsed');document.getElementById('mainContent').classList.toggle('expanded');}});}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('sidebarOverlay').classList.remove('active');}
function logout(){window.Auth.logout();}
</script>
<script src="/js/config.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/escape-html.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/navigation.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
