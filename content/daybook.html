<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Book</title>
<script>(function(){try{const t=JSON.parse(localStorage.getItem('portalTheme')||'{}');if(t.primary_color)document.documentElement.style.setProperty('--primary-color',t.primary_color);if(t.secondary_color)document.documentElement.style.setProperty('--secondary-color',t.secondary_color);if(t.background_color)document.documentElement.style.setProperty('--background-color',t.background_color);if(t.font_family)document.documentElement.style.setProperty('--font-family',t.font_family);}catch(e){}}());</script>
<script src="/js/theme-boot.js"></script>
        <link rel="stylesheet" href="/css/variables.css">
        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/layout.css">
        <link rel="stylesheet" href="/css/cards.css">
        <link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="/css/forms.css">
        <link rel="stylesheet" href="/css/tables.css">
        <link rel="stylesheet" href="/css/modals.css">
        <link rel="stylesheet" href="/css/utilities.css">
        <link rel="stylesheet" href="/css/responsive.css">
<style>body { padding: 24px; box-sizing: border-box; background: var(--background-color, #f5f7fb); }</style>
</head>
<body>
  <div class="main" id="mainContent">
    <div class="page-header"><h2>Day Book</h2></div>
    <!--
      NOTE: the original version of this page treated "day book" as a
      manually created/edited/deleted table of entries (a free-form
      log). In Accounting V1, the Day Book is a derived, read-only
      report of every posted transaction in date order (see
      generalLedger-adjacent dayBook() in src/lib/reports.ts) — there
      is no create/edit/delete concept for it, since every row is a
      real posted voucher, not a free-standing note. This page is now
      read-only to match what the backend actually models.
    -->
    <div class="filter-bar">
        <label style="font-size:13px;font-weight:600;color:#555">From:</label>
        <input type="date" id="fFrom">
        <label style="font-size:13px;font-weight:600;color:#555">To:</label>
        <input type="date" id="fTo">
        <button class="btn-primary" onclick="loadData()">Generate</button>
    </div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>JE No.</th><th>Date</th><th>Narration</th><th>Source</th><th>Amount</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" class="empty-state">Select a date range and click Generate.</td></tr></tbody>
        </table>
    </div>
  </div>
</div>

<script>
function fmt(n){return parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}

window.addEventListener('DOMContentLoaded',function(){
    if (!window.Auth.isAuthenticated()) { window.Auth.checkAuth(); return; }
    const emp = window.Auth.getEmployee();
    if(emp){(function(){var el=document.getElementById('employeeName');if(el)el.textContent=emp.employeeName||emp.username||'—';})();(function(){var el=document.getElementById('employeeMeta');if(el)el.textContent='—';})();}
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('fFrom').value = today;
    document.getElementById('fTo').value = today;
    setupSidebar();
});

async function loadData(){
    const tbody = document.getElementById('tableBody');
    const from = document.getElementById('fFrom').value;
    const to = document.getElementById('fTo').value;
    if(!from || !to){ alert('Both From and To dates are required.'); return; }
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Loading…</td></tr>';
    try{
        const rows = await window.Api.get('/reports/day-book?fromDate='+encodeURIComponent(from)+'&toDate='+encodeURIComponent(to));
        if(!rows.length){ tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No posted transactions in this range.</td></tr>'; return; }
        tbody.innerHTML = rows.map(r=>`<tr>
            <td>${r.je_no}</td>
            <td>${new Date(r.entry_date).toLocaleDateString('en-IN')}</td>
            <td>${escapeHtml(r.narration)||'—'}</td>
            <td><span class="badge">${r.source_type}</span></td>
            <td>₹${fmt(r.total_amount)}</td>
        </tr>`).join('');
    }catch(e){
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Could not load day book: '+(e.message||'Unknown error')+'</td></tr>';
    }
}
function setupSidebar(){const toggle=document.getElementById('sidebarToggle'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');if(toggle&&sidebar)toggle.addEventListener('click',function(){if(window.innerWidth<=900){sidebar.classList.toggle('mobile-open');if(overlay)overlay.classList.toggle('active');}else{sidebar.classList.toggle('collapsed');document.getElementById('mainContent').classList.toggle('expanded');}});}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('sidebarOverlay').classList.remove('active');}
function logout(){window.Auth.logout();}
</script>
<script src="/js/config.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/escape-html.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/navigation.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
