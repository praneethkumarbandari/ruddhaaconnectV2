<body>


            <main class="content"><h1>Stock Out</h1><div class="card"><button class="btn-primary" onclick="window.location.href='inventory.html'">New Stock Out</button><input id="stockOutSearch" placeholder="Search Stock Out" oninput="renderStockOut()"><table><tr><th>Date</th><th>Item</th><th>Qty</th><th>Warehouse</th><th>Reference</th></tr><tbody id="stockOutBody"><tr><td colspan="5" style="text-align:center;padding:30px">Loading…</td></tr></tbody></table></div></main>
        </div>

        
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/escape-html.js"></script>
<script>
        let stockOutRows = [];
        async function loadStockOut(){
            try {
                const db = window.db;
                const [txnsRes, itemsRes] = await Promise.all([
                    db.from('inventory_transactions').select('*').eq('transaction_type','OUT').order('transaction_date',{ascending:false}).limit(100),
                    db.from('inventory').select('id,item_code,item_name')
                ]);
                const itemMap = {};
                (itemsRes.data||[]).forEach(i => itemMap[i.id] = i.item_name || i.item_code || '—');
                stockOutRows = (txnsRes.data||[]).map(t => ({
                    date: t.transaction_date || '—',
                    item: itemMap[t.item_id] || '—',
                    qty: t.quantity || 0,
                    warehouse: t.warehouse || '—',
                    ref: t.source_type || t.remarks || '—'
                }));
                renderStockOut();
            } catch(e) {
                document.getElementById('stockOutBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px">No stock out records found.</td></tr>';
            }
        }
        function renderStockOut(){
            const q = (document.getElementById('stockOutSearch').value || '').toLowerCase();
            const body = document.getElementById('stockOutBody');
            const filtered = stockOutRows.filter(r => !q || r.item.toLowerCase().includes(q) || r.ref.toLowerCase().includes(q));
            if(!filtered.length){ body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px">No stock out records found.</td></tr>'; return; }
            body.innerHTML = filtered.map(r => `<tr><td>${r.date}</td><td>${r.item}</td><td>${r.qty}</td><td>${r.warehouse}</td><td>${r.ref}</td></tr>`).join('');
        }
        loadStockOut();
        </script>
<script>
            function toggleGroup(el) {
                const sub = el.nextElementSibling;
                if (sub && sub.classList.contains("nav-sub")) {
                    sub.classList.toggle("open");
                    el.querySelector(".nav-arrow").style.transform = sub.classList.contains("open")
                        ? "rotate(180deg)"
                        : "none";
                }
            }

            function closeSidebar() {
                document.getElementById("sidebar").classList.remove("open");
                document.getElementById("sidebarOverlay").classList.remove("open");
            }

            function logout() {
                localStorage.removeItem("rc_token");
                localStorage.removeItem("rc_user");
                localStorage.removeItem("loggedEmployee");
                localStorage.removeItem("authToken");
                localStorage.removeItem("userData");
                window.location.href = "business-login.html";
            }

            // Load theme and company info
            async function initPage() {
                try {
                    // Check session
                    const sessionData = localStorage.getItem("loggedEmployee");
                    
                    if (!sessionData) {
                        console.log("Redirecting to login...");
                        window.location.href = "business-login.html";
                        return;
                    }

                    const userData = JSON.parse(sessionData);
                    
                    if (!userData || !userData.employee_id) {
                        console.error("❌ Invalid session data");
                        window.location.href = "business-login.html";
                        return;
                    }
                    (function(){var el=document.getElementById("employeeName");if(el)el.textContent=userData.employeeName || userData.username || "—";})();
                    (function(){var el=document.getElementById("employeeMeta");if(el)el.textContent=userData.department || "—";})();

                    // Load company logo
                    if (userData.companyLogo) {
                        document.getElementById("companyLogo").src = userData.companyLogo;
                    }
                } catch (e) {
                    console.error("❌ Init error:", e);
                    window.location.href = "business-login.html";
                }
            }

            (function(){var el=document.getElementById("sidebarToggle");if(el)el.addEventListener("click", () => {
                const sidebar = document.getElementById("sidebar");
                const overlay = document.getElementById("sidebarOverlay");
                sidebar.classList.toggle("open");
                overlay.classList.toggle("open");
            });})();

            initPage();
        </script>
