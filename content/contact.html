<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<script>
            (function () {
                try {
                    const cached = localStorage.getItem("portalTheme");
                    if (cached) {
                        const t = JSON.parse(cached);
                        if (t.primary_color)
                            document.documentElement.style.setProperty(
                                "--primary-color",
                                t.primary_color,
                            );
                        if (t.secondary_color)
                            document.documentElement.style.setProperty(
                                "--secondary-color",
                                t.secondary_color,
                            );
                        if (t.background_color)
                            document.documentElement.style.setProperty(
                                "--background-color",
                                t.background_color,
                            );
                        if (t.font_family)
                            document.documentElement.style.setProperty(
                                "--font-family",
                                t.font_family,
                            );
                    }
                } catch (e) {}
            })();
        </script>
<script src="/js/theme-boot.js"></script>
        <link rel="stylesheet" href="/css/variables.css">
        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/layout.css">
        <link rel="stylesheet" href="/css/cards.css">
        <link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="/css/forms.css">
        <link rel="stylesheet" href="/css/tables.css">
        <link rel="stylesheet" href="/css/modals.css">
        <link rel="stylesheet" href="/css/utilities.css">
        <link rel="stylesheet" href="/css/responsive.css">
<style>
  body { padding: 24px; box-sizing: border-box; background: var(--background-color, #f5f7fb); }
</style>
</head>
<body>


            <main class="main">
                <div class="content-box">
                    <h1 class="page-title">Contact</h1>
                    <p class="page-subtitle">Contact Us</p>
                </div>

                <div class="content-box">
                    <div class="empty-state">
                        <div class="empty-state-icon">✉️</div>
                        <h3 class="empty-state-title">No messages yet</h3>
                        <p class="empty-state-message">Messages sent from this form open in your email client — this page doesn't keep a message history.</p>
                    </div>
                </div>
            
<div class="card"><h2>Contact Us</h2>
<form id="contactForm" onsubmit="return sendContactMessage(event)">
<input type="text" id="contactName" placeholder="Name" required><br>
<input type="email" id="contactEmail" placeholder="Email" required><br>
<textarea id="contactMessage" placeholder="Message" required></textarea><br>
<button type="submit">Send Message</button>
</form></div>
</main>
        </div>

        
<script>
            function toggleGroup(el) {
                const sub = el.nextElementSibling;
                if (sub && sub.classList.contains("nav-sub")) {
                    sub.classList.toggle("open");
                    el.querySelector(".nav-arrow").style.transform = sub.classList.contains("open")
                        ? "rotate(180deg)"
                        : "none";
                }
            }

            function closeSidebar() {
                document.getElementById("sidebar").classList.remove("open");
                document.getElementById("sidebarOverlay").classList.remove("open");
            }

            function logout() {
                localStorage.removeItem("rc_token");
                localStorage.removeItem("rc_user");
                localStorage.removeItem("loggedEmployee");
                localStorage.removeItem("authToken");
                localStorage.removeItem("userData");
                window.location.href = "business-login.html";
            }

            // ============================================================
            // FIX: this form previously had no onsubmit handler at all —
            // clicking "Send Message" triggered the browser's default
            // form submission (GET to the current URL), silently
            // reloading the page with the message lost and no feedback.
            // No contact_messages table exists anywhere in this app, so
            // this doesn't invent backend storage — it reuses
            // portal_config.support_email (the same field customer-login
            // .html, login.html, and settings.html already read) to open
            // a prefilled mailto, same as an ordinary "Contact Us" mailto
            // link elsewhere in the app.
            // ============================================================
            async function sendContactMessage(evt) {
                evt.preventDefault();
                const name = document.getElementById('contactName').value.trim();
                const email = document.getElementById('contactEmail').value.trim();
                const message = document.getElementById('contactMessage').value.trim();
                if (!name || !email || !message) return false;

                let supportEmail = 'info@ruddhaaconnect.in';
                try {
                    const { data } = await window.db.from('portal_config').select('support_email').limit(1).maybeSingle();
                    if (data && data.support_email) supportEmail = data.support_email;
                } catch (e) { /* fall back to default above */ }

                const subject = encodeURIComponent('Contact form message from ' + name);
                const body = encodeURIComponent(message + '\n\n— ' + name + ' (' + email + ')');
                window.location.href = `mailto:${supportEmail}?subject=${subject}&body=${body}`;
                document.getElementById('contactForm').reset();
                return false;
            }

            // Load theme and company info
            async function initPage() {
                try {
                    // Check session
                    const sessionData = localStorage.getItem("loggedEmployee");
                    
                    if (!sessionData) {
                        console.log("Redirecting to login...");
                        window.location.href = "business-login.html";
                        return;
                    }

                    const userData = JSON.parse(sessionData);
                    
                    if (!userData || !userData.employee_id) {
                        console.error("❌ Invalid session data");
                        window.location.href = "business-login.html";
                        return;
                    }
                    (function(){var el=document.getElementById("employeeName");if(el)el.textContent=userData.employeeName || userData.username || "—";})();
                    (function(){var el=document.getElementById("employeeMeta");if(el)el.textContent=userData.department || "—";})();

                    // Load company logo
                    if (userData.companyLogo) {
                        document.getElementById("companyLogo").src = userData.companyLogo;
                    }
                } catch (e) {
                    console.error("❌ Init error:", e);
                    window.location.href = "business-login.html";
                }
            }

            (function(){var el=document.getElementById("sidebarToggle");if(el)el.addEventListener("click", () => {
                const sidebar = document.getElementById("sidebar");
                const overlay = document.getElementById("sidebarOverlay");
                sidebar.classList.toggle("open");
                overlay.classList.toggle("open");
            });})();

            initPage();
        </script>

</body>
</html>
