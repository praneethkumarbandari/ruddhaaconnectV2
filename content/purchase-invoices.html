<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchase Invoices</title>
<script>(function(){try{const t=JSON.parse(localStorage.getItem('portalTheme')||'{}');if(t.primary_color)document.documentElement.style.setProperty('--primary-color',t.primary_color);if(t.secondary_color)document.documentElement.style.setProperty('--secondary-color',t.secondary_color);if(t.background_color)document.documentElement.style.setProperty('--background-color',t.background_color);if(t.font_family)document.documentElement.style.setProperty('--font-family',t.font_family);}catch(e){}}());</script>
<script src="/js/theme-boot.js"></script>
        <link rel="stylesheet" href="/css/variables.css">
        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/layout.css">
        <link rel="stylesheet" href="/css/cards.css">
        <link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="/css/forms.css">
        <link rel="stylesheet" href="/css/tables.css">
        <link rel="stylesheet" href="/css/modals.css">
        <link rel="stylesheet" href="/css/utilities.css">
        <link rel="stylesheet" href="/css/responsive.css">
<style>body { padding: 24px; box-sizing: border-box; background: var(--background-color, #f5f7fb); }</style>
</head>
<body>
  <div class="main" id="mainContent">
    <div class="page-header">
        <h2>Purchase Invoices</h2>
        <button class="btn-primary" onclick="window.location.href='purchase-invoices-create.html'">＋ New Purchase Invoice</button>
    </div>
    <!--
      NOTE: this page did not exist anywhere in the original shell —
      Accounting V1's backend fully supports purchase invoices, but no
      frontend page was ever built for it. Built new, matching the
      Sales Invoices page pattern exactly. Same architectural note
      applies: no client-side posting logic — every state transition
      goes through the real backend endpoints.
      Also note: there is no update/edit endpoint for purchase invoices
      (only POST / to create, POST /:id/post, POST /:id/cancel — see
      src/routes/purchase-invoices.ts), so "Edit Draft" is not offered;
      a draft can only be posted or left as-is.
    -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search invoices…" oninput="filterTable()">
    </div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Invoice No.</th><th>Vendor Inv. No.</th><th>Date</th><th>Vendor</th><th>Subtotal</th><th>GST</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="9" class="empty-state">Loading…</td></tr></tbody>
        </table>
    </div>
  </div>
</div>

<script>
let allRows=[];
function fmt(n){return parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}

window.addEventListener('DOMContentLoaded', function(){
    if (!window.Auth.isAuthenticated()) { window.Auth.checkAuth(); return; }
    const emp = window.Auth.getEmployee();
    if(emp){(function(){var el=document.getElementById('employeeName');if(el)el.textContent=emp.employeeName||emp.username||'—';})();(function(){var el=document.getElementById('employeeMeta');if(el)el.textContent='—';})();}
    setupSidebar();
    loadInvoices();
});

async function loadInvoices(){
    try{
        allRows = await window.Api.get('/purchase-invoices');
        renderTable(allRows);
    }catch(e){
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty-state">Could not load purchase invoices: '+(e.message||'Unknown error')+'</td></tr>';
    }
}
function filterTable(){
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTable(!q ? allRows : allRows.filter(r => JSON.stringify(r).toLowerCase().includes(q)));
}
function renderTable(rows){
    const tbody = document.getElementById('tableBody');
    if(!rows.length){ tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No purchase invoices found.</td></tr>'; return; }
    tbody.innerHTML = rows.map(r => {
        let actions = '—';
        if(r.status === 'draft'){
            actions = `<button class="action-btn" onclick="postInvoice('${r.id}')"><i class="fa-solid fa-check"></i> Post</button>`;
        } else if(r.status === 'posted'){
            actions = `<button class="action-btn" onclick="cancelInvoice('${r.id}')"><i class="fa-solid fa-xmark"></i> Cancel</button>`;
        }
        return `<tr>
            <td>${r.invoice_no||'(draft)'}</td>
            <td>${r.vendor_invoice_no||'—'}</td>
            <td>${r.invoice_date?new Date(r.invoice_date).toLocaleDateString('en-IN'):'—'}</td>
            <td>${escapeHtml(r.vendor_name)||('#'+r.vendor_id)}</td>
            <td>₹${fmt(r.subtotal)}</td>
            <td>₹${fmt(r.gst_amount)}</td>
            <td>₹${fmt(r.total)}</td>
            <td><span class="badge ${r.status}">${r.status}</span></td>
            <td>${actions}</td>
        </tr>`;
    }).join('');
}
async function postInvoice(id){
    if(!confirm('Post this purchase invoice? This creates a real, permanent journal entry.')) return;
    try{ await window.Api.post('/purchase-invoices/'+id+'/post'); loadInvoices(); }
    catch(e){ alert('Could not post: '+(e.message||'Unknown error')); }
}
async function cancelInvoice(id){
    const reason = prompt('Reason for cancelling this purchase invoice:');
    if(reason===null) return;
    if(!reason.trim()){ alert('A reason is required.'); return; }
    try{ await window.Api.post('/purchase-invoices/'+id+'/cancel', { reason: reason.trim() }); loadInvoices(); }
    catch(e){ alert('Could not cancel: '+(e.message||'Unknown error')); }
}
function setupSidebar(){const toggle=document.getElementById('sidebarToggle'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');if(toggle&&sidebar)toggle.addEventListener('click',function(){if(window.innerWidth<=900){sidebar.classList.toggle('mobile-open');if(overlay)overlay.classList.toggle('active');}else{sidebar.classList.toggle('collapsed');document.getElementById('mainContent').classList.toggle('expanded');}});}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('sidebarOverlay').classList.remove('active');}
function logout(){window.Auth.logout();}
</script>
<script src="/js/config.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/escape-html.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/navigation.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
