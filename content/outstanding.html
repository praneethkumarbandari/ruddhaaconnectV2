<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outstanding Reports</title>
<script>(function(){try{const t=JSON.parse(localStorage.getItem('portalTheme')||'{}');if(t.primary_color)document.documentElement.style.setProperty('--primary-color',t.primary_color);if(t.secondary_color)document.documentElement.style.setProperty('--secondary-color',t.secondary_color);if(t.background_color)document.documentElement.style.setProperty('--background-color',t.background_color);if(t.font_family)document.documentElement.style.setProperty('--font-family',t.font_family);}catch(e){}}());</script>
<script src="/js/theme-boot.js"></script>
        <link rel="stylesheet" href="/css/variables.css">
        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/layout.css">
        <link rel="stylesheet" href="/css/cards.css">
        <link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="/css/forms.css">
        <link rel="stylesheet" href="/css/tables.css">
        <link rel="stylesheet" href="/css/modals.css">
        <link rel="stylesheet" href="/css/utilities.css">
        <link rel="stylesheet" href="/css/responsive.css">
<style>body { padding: 24px; box-sizing: border-box; background: var(--background-color, #f5f7fb); }</style>
</head>
<body>
  <div class="main" id="mainContent">
    <div class="page-header"><h2>Outstanding Reports</h2></div>
    <!-- NOTE: this page did not exist anywhere in the original shell. Built new. -->
    <div class="report-card" style="margin-bottom:16px;">
        <div class="report-title">Customer Outstanding</div>
        <table>
            <thead><tr><th>Customer</th><th>Outstanding</th></tr></thead>
            <tbody id="custBody"><tr><td colspan="2" class="empty-state">Loading…</td></tr></tbody>
        </table>
    </div>
    <div class="report-card">
        <div class="report-title">Vendor Outstanding</div>
        <table>
            <thead><tr><th>Vendor</th><th>Outstanding</th></tr></thead>
            <tbody id="vendBody"><tr><td colspan="2" class="empty-state">Loading…</td></tr></tbody>
        </table>
    </div>
  </div>
</div>

<script>
function fmt(n){return parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}

window.addEventListener('DOMContentLoaded', async function(){
    if (!window.Auth.isAuthenticated()) { window.Auth.checkAuth(); return; }
    const emp = window.Auth.getEmployee();
    if(emp){(function(){var el=document.getElementById('employeeName');if(el)el.textContent=emp.employeeName||emp.username||'—';})();(function(){var el=document.getElementById('employeeMeta');if(el)el.textContent='—';})();}
    setupSidebar();
    loadData();
});

async function loadData(){
    try{
        const cust = await window.Api.get('/reports/customer-outstanding');
        document.getElementById('custBody').innerHTML = cust.length ? cust.map(r=>`<tr><td>${escapeHtml(r.customer_name)}</td><td>₹${fmt(r.outstanding)}</td></tr>`).join('') : '<tr><td colspan="2" class="empty-state">No outstanding balances.</td></tr>';
    }catch(e){
        document.getElementById('custBody').innerHTML = '<tr><td colspan="2" class="empty-state">Could not load: '+(e.message||'Unknown error')+'</td></tr>';
    }
    try{
        const vend = await window.Api.get('/reports/vendor-outstanding');
        document.getElementById('vendBody').innerHTML = vend.length ? vend.map(r=>`<tr><td>${escapeHtml(r.vendor_name)}</td><td>₹${fmt(r.outstanding)}</td></tr>`).join('') : '<tr><td colspan="2" class="empty-state">No outstanding balances.</td></tr>';
    }catch(e){
        document.getElementById('vendBody').innerHTML = '<tr><td colspan="2" class="empty-state">Could not load: '+(e.message||'Unknown error')+'</td></tr>';
    }
}
function setupSidebar(){const toggle=document.getElementById('sidebarToggle'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');if(toggle&&sidebar)toggle.addEventListener('click',function(){if(window.innerWidth<=900){sidebar.classList.toggle('mobile-open');if(overlay)overlay.classList.toggle('active');}else{sidebar.classList.toggle('collapsed');document.getElementById('mainContent').classList.toggle('expanded');}});}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('sidebarOverlay').classList.remove('active');}
function logout(){window.Auth.logout();}
</script>
<script src="/js/config.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/escape-html.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/navigation.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
