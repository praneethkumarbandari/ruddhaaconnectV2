<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDS Reports</title>
<script>(function(){try{const t=JSON.parse(localStorage.getItem('portalTheme')||'{}');if(t.primary_color)document.documentElement.style.setProperty('--primary-color',t.primary_color);if(t.secondary_color)document.documentElement.style.setProperty('--secondary-color',t.secondary_color);if(t.background_color)document.documentElement.style.setProperty('--background-color',t.background_color);if(t.font_family)document.documentElement.style.setProperty('--font-family',t.font_family);}catch(e){}}());</script>
<script src="/js/theme-boot.js"></script>
<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/forms.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/responsive.css">
<style>
body{padding:24px;box-sizing:border-box;background:var(--background-color,#f5f7fb);}
.tab-bar{display:flex;gap:8px;margin-bottom:18px;border-bottom:2px solid #e2e6ee;}
.tab-btn{padding:10px 16px;border:none;background:none;font-size:13px;font-weight:600;color:#8a93a6;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab-btn.active{color:var(--primary-color,#1f6bff);border-bottom-color:var(--primary-color,#1f6bff);}
.report-card{background: var(--card-color, #fff); backdrop-filter: blur(var(--card-blur, 16px)); -webkit-backdrop-filter: blur(var(--card-blur, 16px));border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);padding:20px;margin-bottom:16px;}
.report-title{font-weight:700;font-size:14px;color:#1a2233;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:#8a93a6;background:#f7f9fc;border-bottom:1px solid #e2e6ee;}
td{padding:8px 10px;border-bottom:1px solid #f0f2f6;}
.limitation-note{background:#fff3cd;color:#856404;padding:10px 14px;border-radius:6px;font-size:12px;margin-top:8px;}
.placeholder-box{background: var(--card-color, #fff); backdrop-filter: blur(var(--card-blur, 16px)); -webkit-backdrop-filter: blur(var(--card-blur, 16px));border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);padding:60px;text-align:center;color:#aaa;font-size:14px;}
</style>
</head>
<body>
  <div class="main" id="mainContent">
    <div class="page-header"><h2>TDS Reports</h2></div>

    <div class="filter-bar" id="dateRangeFilter">
        <label style="font-size:13px;font-weight:600;color:#555">From:</label>
        <input type="date" id="fFrom">
        <label style="font-size:13px;font-weight:600;color:#555">To:</label>
        <input type="date" id="fTo">
        <button class="btn-primary" onclick="loadCurrentTab()">Generate</button>
    </div>
    <div class="filter-bar" id="fyQuarterFilter" style="display:none;">
        <select id="fFinancialYear"><option value="">Select financial year…</option></select>
        <select id="fQuarter">
          <option value="1">Q1 (Apr–Jun)</option><option value="2">Q2 (Jul–Sep)</option>
          <option value="3">Q3 (Oct–Dec)</option><option value="4">Q4 (Jan–Mar)</option>
        </select>
        <button class="btn-primary" onclick="loadCurrentTab()">Generate</button>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('register')">Deduction Register</button>
      <button class="tab-btn" onclick="switchTab('form16a')">Form 16A Summary</button>
      <button class="tab-btn" onclick="switchTab('26q')">26Q Summary</button>
    </div>

    <div id="reportArea"><div class="placeholder-box">Select a date range and click Generate.</div></div>
  </div>

<script>
let currentTab = 'register';
function fmt(n){return parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}

window.addEventListener('DOMContentLoaded',async function(){
    if (!window.Auth.isAuthenticated()) { window.Auth.checkAuth(); return; }
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('fFrom').value = today.slice(0,8)+'01';
    document.getElementById('fTo').value = today;
    try{
        const fys = await window.Api.get('/financial-years');
        document.getElementById('fFinancialYear').innerHTML = '<option value="">Select financial year…</option>' + fys.map(f=>`<option value="${f.id}">${f.code}</option>`).join('');
    }catch(e){}
});
function switchTab(tab){
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('dateRangeFilter').style.display = tab === 'register' ? 'flex' : 'none';
    document.getElementById('fyQuarterFilter').style.display = tab === 'register' ? 'none' : 'flex';
    document.getElementById('reportArea').innerHTML = '<div class="placeholder-box">Select filters above and click Generate.</div>';
}
function loadCurrentTab(){
    if (currentTab === 'register') loadRegister();
    else if (currentTab === 'form16a') loadForm16a();
    else if (currentTab === '26q') load26q();
}
function loadingState(){ document.getElementById('reportArea').innerHTML = '<div class="placeholder-box">Generating…</div>'; }
function errorState(msg){ document.getElementById('reportArea').innerHTML = '<div class="placeholder-box" style="color:#c0392b;">'+msg+'</div>'; }

async function loadRegister(){
    const from = document.getElementById('fFrom').value, to = document.getElementById('fTo').value;
    if(!from||!to){ alert('Both dates are required.'); return; }
    loadingState();
    try{
        const rows = await window.Api.get('/tds/register?fromDate='+encodeURIComponent(from)+'&toDate='+encodeURIComponent(to));
        const body = rows.map(r=>`<tr${r.reversed_at?' style="opacity:0.5;text-decoration:line-through;"':''}><td>${r.payment_no||'—'}</td><td>${new Date(r.deduction_date).toLocaleDateString('en-IN')}</td><td>${escapeHtml(r.vendor_name)}</td><td>${r.pan||'—'}</td><td>${r.section_code}</td><td>₹${fmt(r.gross_amount)}</td><td>${r.tds_rate}%</td><td>₹${fmt(r.tds_amount)}</td><td>${r.reversed_at?'Reversed':'Active'}</td></tr>`).join('') || '<tr><td colspan="9" class="empty-state">No deductions found.</td></tr>';
        document.getElementById('reportArea').innerHTML = `
          <div class="report-card"><div class="report-title">TDS Deduction Register</div>
            <table><thead><tr><th>Payment</th><th>Date</th><th>Vendor</th><th>PAN</th><th>Section</th><th>Gross</th><th>Rate</th><th>TDS</th><th>Status</th></tr></thead><tbody>${body}</tbody></table>
            <div class="limitation-note">Reversed deductions (shown struck through) remain here for a complete audit history, but are correctly excluded from Form 16A and 26Q totals.</div>
          </div>`;
    }catch(e){ errorState('Could not load register: '+(e.message||'Unknown error')); }
}

async function loadForm16a(){
    const fyId = document.getElementById('fFinancialYear').value;
    const quarter = document.getElementById('fQuarter').value;
    if(!fyId){ alert('Select a financial year.'); return; }
    loadingState();
    try{
        const rows = await window.Api.get('/tds/form16a-summary?financialYearId='+encodeURIComponent(fyId)+'&quarter='+encodeURIComponent(quarter));
        const body = rows.map(r=>`<tr><td>${escapeHtml(r.vendor_name)}</td><td>${r.pan||'—'}</td><td>${r.section_code} — ${escapeHtml(r.section_name)}</td><td>${r.deduction_count}</td><td>₹${fmt(r.total_gross_amount)}</td><td>₹${fmt(r.total_tds_amount)}</td></tr>`).join('') || '<tr><td colspan="6" class="empty-state">No deductions found for this period.</td></tr>';
        document.getElementById('reportArea').innerHTML = `
          <div class="report-card"><div class="report-title">Form 16A Summary — Q${quarter}</div>
            <table><thead><tr><th>Vendor</th><th>PAN</th><th>Section</th><th>Count</th><th>Gross Amount</th><th>TDS Deducted</th></tr></thead><tbody>${body}</tbody></table>
            <div class="limitation-note">This is the real, accurate summary a Form 16A certificate is built from — it is not the official TRACES-generated PDF, which requires portal generation and digital signature this system cannot produce.</div>
          </div>`;
    }catch(e){ errorState('Could not load Form 16A summary: '+(e.message||'Unknown error')); }
}

async function load26q(){
    const fyId = document.getElementById('fFinancialYear').value;
    const quarter = document.getElementById('fQuarter').value;
    if(!fyId){ alert('Select a financial year.'); return; }
    loadingState();
    try{
        const d = await window.Api.get('/tds/26q-summary?financialYearId='+encodeURIComponent(fyId)+'&quarter='+encodeURIComponent(quarter));
        const body = d.rows.map(r=>`<tr><td>${r.section_code}</td><td>${escapeHtml(r.vendor_name)}</td><td>${r.pan||'—'}</td><td>₹${fmt(r.total_gross_amount)}</td><td>₹${fmt(r.total_tds_amount)}</td></tr>`).join('') || '<tr><td colspan="5" class="empty-state">No deductions found for this period.</td></tr>';
        document.getElementById('reportArea').innerHTML = `
          <div class="report-card"><div class="report-title">26Q Summary — Q${quarter}</div>
            <table><thead><tr><th>Section</th><th>Vendor</th><th>PAN</th><th>Gross Amount</th><th>TDS Deducted</th></tr></thead><tbody>${body}</tbody></table>
            ${d.missingPanWarning ? `<div class="limitation-note">⚠️ ${d.missingPanWarning}</div>` : ''}
            <div class="limitation-note">This is the real, correct underlying data for a 26Q return — not an actual e-filed return, which requires TAN-based TRACES API access this system does not have.</div>
          </div>`;
    }catch(e){ errorState('Could not load 26Q summary: '+(e.message||'Unknown error')); }
}
function logout(){window.Auth.logout();}
</script>
<script src="/js/config.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/escape-html.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
