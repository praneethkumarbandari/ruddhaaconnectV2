<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Invoice</title>
<script>(function(){try{const t=JSON.parse(localStorage.getItem('portalTheme')||'{}');if(t.primary_color)document.documentElement.style.setProperty('--primary-color',t.primary_color);if(t.secondary_color)document.documentElement.style.setProperty('--secondary-color',t.secondary_color);if(t.background_color)document.documentElement.style.setProperty('--background-color',t.background_color);if(t.font_family)document.documentElement.style.setProperty('--font-family',t.font_family);}catch(e){}}());</script>
<script src="/js/theme-boot.js"></script>
<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/modals.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/responsive.css">
<style>
body{padding:24px;box-sizing:border-box;background:var(--background-color,#f5f7fb);}
.page-title{font-size:22px;font-weight:900;color:#111;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.form-card{background: var(--card-color, #fff); backdrop-filter: blur(var(--card-blur, 16px)); -webkit-backdrop-filter: blur(var(--card-blur, 16px));border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);padding:24px;margin-bottom:24px;}
.form-section-title{font-size:14px;font-weight:900;color:#111;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--secondary-color,#dbe7ff);}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row.full{grid-template-columns:1fr;}
.form-row.cols2{grid-template-columns:1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{font-size:11px;font-weight:700;color:#444;text-transform:uppercase;}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;color:#222;background:#fff;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary-color,#1f6bff);}
.form-group input[readonly]{background:#f5f7fb;cursor:not-allowed;color:#666;}
.autocomplete-container{position:relative;}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background: var(--card-color, #fff); backdrop-filter: blur(var(--card-blur, 16px)); -webkit-backdrop-filter: blur(var(--card-blur, 16px));border:1px solid #ddd;border-top:none;border-radius:0 0 6px 6px;max-height:160px;overflow-y:auto;display:none;z-index:1000;box-shadow:0 4px 8px rgba(0,0,0,.1);}
.autocomplete-list.active{display:block;}
.autocomplete-items{max-height:120px;overflow-y:auto;}
.autocomplete-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:13px;}
.autocomplete-item:hover{background:var(--secondary-color,#dbe7ff);}
.autocomplete-item strong{color:var(--primary-color,#1f6bff);}
.autocomplete-item.add-new{background:var(--primary-color,#1f6bff);color:#fff;font-weight:700;text-align:center;cursor:pointer;}
.items-table{width:100%;border-collapse:collapse;margin:20px 0;}
.items-table th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#888;background:transparent;border-bottom:1px solid #eee;text-transform:uppercase;}
.items-table td{padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;}
.items-table input{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;}
/* FIX (line-item alignment): Qty/Rate/GST%/Amount are numbers — left
   over from the default table alignment, they read oddly against a
   financial table where numeric columns are conventionally
   right-aligned. The delete icon column is centered rather than
   left-stuck to the row's edge. Item/UOM stay left-aligned (text). */
.items-table th:nth-child(n+3):nth-child(-n+6),
.items-table td:nth-child(n+3):nth-child(-n+6){text-align:right;}
.items-table td:nth-child(n+3):nth-child(-n+6) input{text-align:right;}
.items-table th:last-child,
.items-table td:last-child{text-align:center;}
.totals-plain{display:flex;flex-direction:column;align-items:flex-end;gap:2px;margin:16px 0;padding-right:12px;}
.totals-plain .total-row{display:flex;justify-content:space-between;gap:24px;width:280px;padding:5px 0;font-size:13px;font-weight:600;color:#444;border:none;}
.totals-plain .total-row.net{color:var(--primary-color,#1f6bff);font-size:17px;font-weight:900;margin-top:6px;padding-top:8px;border-top:1.5px solid #ddd;}
.discount-group{display:flex;gap:10px;align-items:center;margin:20px 0;}
.discount-group input:not([type="checkbox"]){flex:1;padding:10px 12px;border:1.5px solid #ddd;border-radius:6px;}
.discount-group input[type="checkbox"]{flex:none;width:16px;height:16px;margin:0;}
.msg-inline{padding:10px 14px;border-radius:6px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;}
.msg-inline.error{background:#fdecea;color:#c62828;}
.msg-inline.success{background:#e8f5e9;color:#2e7d32;}
.form-actions{display:flex;gap:10px;justify-content:center;margin-top:24px;padding-top:20px;border-top:2px solid var(--secondary-color,#dbe7ff);}
@media(max-width:1200px){.form-row{grid-template-columns:1fr 1fr;}}
@media(max-width:900px){.form-row{grid-template-columns:1fr;}}
/* FIX (Create Invoice redesign — two-column layout): column 1 holds
   Invoice Type/Number/Date/Due Date/Party Name (+ Vendor Invoice
   Number for purchases); column 2 holds compact party info (GSTIN,
   Supply Type, Phone, Email, Address). Collapses to one column on
   narrow screens rather than squeezing two columns into no room. */
.invoice-two-col{display:grid;grid-template-columns:1.2fr 1fr;gap:28px;align-items:start;}
@media(max-width:900px){.invoice-two-col{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="main" id="mainContent">
  <div><span class="back-link" onclick="window.top.location.href='/invoices.html'">← Back to Invoices</span></div>
  <div class="page-title">
    <span id="pageTitle">📄 Create Invoice</span>
  </div>

  <div class="form-card">
    <div id="successMsg" class="msg-inline success"></div>
    <div id="errorMsg" class="msg-inline error"></div>

    <div class="invoice-two-col">
      <div class="invoice-col-1">
        <div class="form-section-title">Invoice Details</div>
        <div class="form-row cols2">
          <div class="form-group">
            <label>Invoice Type *</label>
            <select id="invoiceType" onchange="onTypeChange()">
              <option value="">-- Select --</option>
              <option value="sales">Sales</option>
              <option value="purchase">Purchase</option>
              <option value="goods_return">Goods Return</option>
              <option value="debit_note">Debit Note</option>
              <option value="credit_note">Credit Note</option>
            </select>
          </div>
          <div class="form-group"><label>Invoice Number</label><input type="text" id="invoiceNumber" readonly></div>
        </div>
        <div class="form-row cols2">
          <div class="form-group"><label>Date *</label><input type="date" id="invoiceDate"></div>
          <div class="form-group"><label>Due Date</label><input type="date" id="dueDate"></div>
        </div>

        <div id="engineBody" style="display:none;">
          <div class="form-section-title" style="margin-top:16px;" id="partyLabel">Customer / Vendor</div>
          <div class="form-row full">
            <div class="form-group">
              <label>Name *</label>
              <div class="autocomplete-container">
                <input type="text" id="partySearch" placeholder="Type a name…" autocomplete="off">
                <div class="autocomplete-list" id="partyResults"></div>
              </div>
            </div>
          </div>
          <!-- Vendor Invoice Number: purchase only — see onTypeChange(), which
               shows/hides this row exactly as before, just relocated to column 1. -->
          <div class="form-row full" id="rowVendorInvoiceNo" style="display:none;">
            <div class="form-group"><label>Vendor Invoice Number *</label><input type="text" id="vendorInvoiceNo" placeholder="As shown on the vendor's own invoice"></div>
          </div>
          <input type="hidden" id="partyId">
        </div>
      </div>

      <div class="invoice-col-2" id="partyInfoCol" style="display:none;">
        <div class="form-section-title">Party Information</div>
        <div class="form-row cols2">
          <div class="form-group"><label>GSTIN</label><input type="text" id="partyGstin" readonly placeholder="Shown once selected"></div>
          <div class="form-group"><label>Supply Type</label><input type="text" id="partySupplyType" readonly></div>
        </div>
        <div class="form-row cols2">
          <div class="form-group"><label>Phone</label><input type="text" id="partyPhone" readonly></div>
          <div class="form-group"><label>Email</label><input type="text" id="partyEmail" readonly></div>
        </div>
        <div class="form-row full">
          <div class="form-group"><label>Address</label><textarea id="partyAddress" readonly style="min-height:44px;"></textarea></div>
        </div>
        <div class="form-row full">
          <div class="form-group"><label>Project <span style="font-weight:400;text-transform:none;color:#8a93a6;">(optional)</span></label>
            <select id="invoiceProject"><option value="">—</option></select>
          </div>
        </div>
      </div>
    </div>

    <div id="lineItemsBody" style="display:none;">
      <div class="form-section-title" style="margin-top:20px;">Line Items</div>
      <table class="items-table">
        <thead><tr><th>Item</th><th>UOM</th><th>Qty</th><th>Rate</th><th>GST%</th><th>Amount</th><th></th></tr></thead>
        <tbody id="linesBody"></tbody>
      </table>

      <div class="totals-plain">
        <div class="total-row"><span>Subtotal</span><span id="tGross">₹0.00</span></div>
        <div class="total-row" id="rowCgst" style="display:none;"><span>CGST</span><span id="tCgst">₹0.00</span></div>
        <div class="total-row" id="rowSgst" style="display:none;"><span>SGST</span><span id="tSgst">₹0.00</span></div>
        <div class="total-row" id="rowIgst" style="display:none;"><span>IGST</span><span id="tIgst">₹0.00</span></div>
        <div class="total-row"><span>Gross Total</span><span id="tGrossTotal">₹0.00</span></div>
        <div class="total-row"><span>Discount</span><span id="tDiscount">₹0.00</span></div>
        <div class="total-row"><span>Round Off</span><span id="tRoundOff">₹0.00</span></div>
        <div class="total-row net"><span>Net Total</span><span id="tNet">₹0.00</span></div>
      </div>

      <div class="discount-group">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#444;white-space:nowrap;">
          <input type="checkbox" id="discPercentToggle" onchange="toggleDiscType()"> Discount is %
        </label>
        <input type="number" id="discValue" value="0" step="0.01" placeholder="Discount">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#444;white-space:nowrap;">
          <input type="checkbox" id="roundOffCheckbox" checked> Round Off
        </label>
      </div>

      <div class="form-row full">
        <div class="form-group"><label>Narration</label><textarea id="narration" style="min-height:44px;"></textarea></div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="submitInvoice(true)"><i class="fa-solid fa-floppy-disk"></i> Post</button>
        <button class="btn-secondary" onclick="submitInvoice(false)">Save as Draft</button>
        <button class="btn-secondary" onclick="printInvoice()"><i class="fa-solid fa-print"></i> Print</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="partyModal">
  <div class="modal">
    <div class="modal-header"><h3 id="partyModalTitle">Add New</h3><button class="modal-header-close" onclick="closeModal('partyModal')"><i class="fa-solid fa-xmark"></i> </button></div>
    <div class="modal-body">
      <div class="field"><label>Name *</label><input type="text" id="npName"></div>
      <div class="field"><label>Email</label><input type="text" id="npEmail"></div>
      <div class="field"><label>Phone</label><input type="text" id="npPhone"></div>
      <div class="field"><label>GSTIN</label><input type="text" id="npGstin"></div>
      <div class="field"><label>Supply Type</label>
        <select id="npSupplyType"><option value="intrastate">Intrastate (CGST+SGST)</option><option value="interstate">Interstate (IGST)</option></select>
      </div>
      <p id="npErr" style="color:#c0392b;font-size:13px;display:none;"></p>
    </div>
    <div class="modal-footer"><button class="btn-primary" onclick="saveNewParty()">Create</button></div>
  </div>
</div>

<div class="modal-overlay" id="itemModal">
  <div class="modal">
    <div class="modal-header"><h3>Add New Item</h3><button class="modal-header-close" onclick="closeModal('itemModal')"><i class="fa-solid fa-xmark"></i> </button></div>
    <div class="modal-body">
      <div class="field"><label>Item Name *</label><input type="text" id="niName"></div>
      <p style="color:#8a93a6;font-size:12px;margin-top:-8px;">Item code is generated automatically.</p>
      <div class="field-row three">
        <div class="field"><label>UOM</label><input type="text" id="niUom" value="nos"></div>
        <div class="field"><label>GST %</label><input type="number" id="niGst" value="18" step="0.01"></div>
        <div class="field"><label>HSN</label><input type="text" id="niHsn"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Sale Rate</label><input type="number" id="niSaleRate" value="0" step="0.01"></div>
        <div class="field"><label>Purchase Rate</label><input type="number" id="niPurchaseRate" value="0" step="0.01"></div>
      </div>
      <p id="niErr" style="color:#c0392b;font-size:13px;display:none;"></p>
    </div>
    <div class="modal-footer"><button class="btn-primary" onclick="saveNewItem()">Create</button></div>
  </div>
</div>

<script>
const TYPE_CONFIG = {
  sales:        { label:'Sales Invoice', numberType:'sales_invoice', partyKind:'customer', endpoint:'/sales-invoices', partyField:'customerId', rateField:'sale_rate', partyLabel:'Customer' },
  purchase:     { label:'Purchase Invoice', numberType:'purchase_invoice', partyKind:'vendor', endpoint:'/purchase-invoices', partyField:'vendorId', rateField:'purchase_rate', partyLabel:'Vendor' },
  goods_return: { label:'Goods Return', numberType:'goods_return', partyKind:'customer', endpoint:'/credit-notes', partyField:'customerId', rateField:'sale_rate', usesAgainst:true, partyLabel:'Customer' },
  debit_note:   { label:'Debit Note', numberType:'debit_note', partyKind:'vendor', endpoint:'/debit-notes', partyField:'vendorId', rateField:'purchase_rate', usesAgainst:true, partyLabel:'Vendor' },
  credit_note:  { label:'Credit Note', numberType:'credit_note', partyKind:'customer', endpoint:'/credit-notes', partyField:'customerId', rateField:'sale_rate', usesAgainst:true, partyLabel:'Customer' },
};

let currentType=null, selectedParty=null, lines=[], allParties=null, discountType='amount';
let editId=null, editEndpoint=null;

window.addEventListener('DOMContentLoaded', async function(){
  if (!window.Auth || !window.Auth.isAuthenticated()) { if(window.Auth) window.Auth.checkAuth(); return; }
  document.getElementById('invoiceDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('partySearch').addEventListener('input', onPartySearch);
  document.getElementById('linesBody').addEventListener('input', function(e){
    if (e.target && e.target.id === 'itemSearch') onItemSearch.call(e.target);
  });
  document.getElementById('discValue').addEventListener('input', renderTotals);
  document.getElementById('roundOffCheckbox').addEventListener('change', renderTotals);
  document.addEventListener('click', function(e){
    if (!e.target.closest('#partySearch') && !e.target.closest('#partyResults')) document.getElementById('partyResults').classList.remove('active');
    if (!e.target.closest('#itemSearch') && !e.target.closest('#itemResults')) { const r = document.getElementById('itemResults'); if (r) r.classList.remove('active'); }
  });

  // FIX (Project Reports gap): Revenue/Cash Flow/Outstanding reports
  // (pm-reports.html) filter by a project_id already supported end to
  // end on the backend (createDraftSalesInvoice/createDraftPurchase
  // Invoice both accept projectId) — but this form never asked for
  // one, so those reports came back empty for every invoice. Same
  // optional dropdown pattern costing.html's "Linked Project" field
  // already uses.
  try{
    const projects = await window.Api.get('/projects');
    document.getElementById('invoiceProject').innerHTML = '<option value="">—</option>' +
      (projects||[]).map(p=>`<option value="${p.id}">${escapeHtml(p.project_code||p.id)} — ${escapeHtml(p.project_name||'')}</option>`).join('');
  }catch(e){ console.warn('Could not load projects:', e.message); }

  // FIX (Invoice List Actions — Edit for drafts): this page was
  // create-only. invoices.html's Edit button (draft rows only) links
  // here with ?editEndpoint=&editId=&type= — if present, load that
  // draft's real data into the same form instead of starting blank.
  const params = new URLSearchParams(window.location.search);
  const qEndpoint = params.get('editEndpoint');
  const qId = params.get('editId');
  const qType = params.get('type');
  if (qEndpoint && qId && qType) {
    await loadForEdit(qEndpoint, Number(qId), qType);
  }
});

/** Populates the form from an existing DRAFT invoice instead of starting blank — see the DOMContentLoaded note above. */
async function loadForEdit(endpoint, id, type){
  editEndpoint = endpoint;
  editId = id;
  document.getElementById('invoiceType').value = type;
  document.getElementById('invoiceType').disabled = true; // can't change an existing document's type
  onTypeChange();
  try{
    const inv = await window.Api.get(endpoint+'/'+id);
    if (inv.status !== 'draft') {
      alert('Only a draft invoice can be edited. This one is ' + inv.status + '.');
      window.top.location.href = '/invoices.html';
      return;
    }
    const cfg = TYPE_CONFIG[type];
    selectedParty = {
      kind: cfg.partyKind,
      id: inv[cfg.partyField],
      name: inv.customer_name || inv.vendor_name,
      email: inv.email || null,
      phone: inv.phone || null,
      gstin: inv.customer_gstin || inv.vendor_gstin || inv.gstin || null,
      supply_type: inv.supply_type || 'intrastate',
      address_line1: inv.address_line1 || null,
      address_line2: inv.address_line2 || null,
      city: inv.city || null,
      state: inv.state || null,
      pincode: inv.pincode || null,
    };
    document.getElementById('partySearch').value = selectedParty.name || '';
    document.getElementById('partyEmail').value = selectedParty.email || '';
    document.getElementById('partyPhone').value = selectedParty.phone || '';
    document.getElementById('partyGstin').value = selectedParty.gstin || '';
    document.getElementById('partySupplyType').value = selectedParty.supply_type || '';
    document.getElementById('partyAddress').value = [selectedParty.address_line1, selectedParty.address_line2, selectedParty.city, selectedParty.state, selectedParty.pincode].filter(Boolean).join(', ');

    lines = (inv.lines || []).map(l => ({
      itemId: l.item_id || null, code: '', description: l.description,
      uom: '', qty: Number(l.qty), rate: Number(l.rate), gstRate: Number(l.gst_rate), hsn: l.hsn || null,
    }));
    renderLines();

    document.getElementById('invoiceNumber').value = inv.invoice_no || inv.note_no || '(assigned on save)';
    document.getElementById('invoiceDate').value = (inv.invoice_date || inv.note_date || '').slice(0, 10);
    if (inv.due_date) document.getElementById('dueDate').value = inv.due_date.slice(0, 10);
    if (inv.narration) document.getElementById('narration').value = inv.narration;
    if (type === 'purchase' && inv.vendor_invoice_no) document.getElementById('vendorInvoiceNo').value = inv.vendor_invoice_no;
    document.getElementById('invoiceProject').value = inv.project_id || '';

    document.getElementById('pageTitle') && (document.getElementById('pageTitle').textContent = 'Edit ' + cfg.label);
  }catch(e){
    alert('Could not load this invoice for editing: ' + (e.message || 'Unknown error'));
    window.top.location.href = '/invoices.html';
  }
}


function onTypeChange(){
  currentType = document.getElementById('invoiceType').value;
  if (!currentType) {
    document.getElementById('engineBody').style.display='none';
    document.getElementById('partyInfoCol').style.display='none';
    document.getElementById('lineItemsBody').style.display='none';
    return;
  }
  document.getElementById('engineBody').style.display='block';
  document.getElementById('partyInfoCol').style.display='block';
  document.getElementById('lineItemsBody').style.display='block';
  document.getElementById('partyLabel').textContent = TYPE_CONFIG[currentType].partyLabel;
  selectedParty=null; lines=[];
  document.getElementById('partySearch').value='';
  ['partyEmail','partyPhone','partyGstin','partySupplyType','partyAddress'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('rowVendorInvoiceNo').style.display = currentType==='purchase' ? 'grid' : 'none';
  document.getElementById('vendorInvoiceNo').value='';
  renderLines();
  loadNextNumber();
}

async function loadNextNumber(){
  const cfg=TYPE_CONFIG[currentType];
  document.getElementById('invoiceNumber').value='Loading…';
  try{
    const preview=await window.Api.get('/numbering/preview?documentType='+cfg.numberType);
    document.getElementById('invoiceNumber').value=preview.formatted||preview.next||'—';
  }catch(e){ document.getElementById('invoiceNumber').value='(assigned on save)'; }
}

async function ensurePartiesLoaded(){
  if (allParties) return allParties;
  const [customers, vendors] = await Promise.all([window.Api.get('/customers'), window.Api.get('/vendors')]);
  allParties = [
    ...customers.map(c=>({ id:c.id, name:c.customer_name, email:c.email, phone:c.phone, gstin:c.gstin, supply_type:c.supply_type, address_line1:c.address_line1, address_line2:c.address_line2, city:c.city, state:c.state, pincode:c.pincode, kind:'customer' })),
    ...vendors.map(v=>({ id:v.id, name:v.vendor_name, email:v.email, phone:v.phone, gstin:v.gstin, supply_type:v.supply_type, address_line1:v.address_line1, address_line2:v.address_line2, city:v.city, state:v.state, pincode:v.pincode, kind:'vendor' })),
  ];
  return allParties;
}
async function onPartySearch(){
  const q=this.value.trim().toLowerCase(); const box=document.getElementById('partyResults'), list=box;
  if(!q){ box.classList.remove('active'); return; }
  const parties=await ensurePartiesLoaded();
  const matches=parties.filter(p=>p.name.toLowerCase().includes(q)).slice(0,3);
  let html='<div class="autocomplete-items">'+matches.map(p=>`<div class="autocomplete-item" onclick='pickParty(${JSON.stringify(p).replace(/'/g,"&#39;")})'><strong>${escapeHtml(p.name)}</strong><br><small>${p.kind==='customer'?'Customer':'Vendor'} | ${escapeHtml(p.gstin)||'no GSTIN'}</small></div>`).join('')+'</div>';
  html+=`<div class="autocomplete-item add-new" onclick="openPartyModal('${this.value.trim().replace(/'/g,"")}')">＋ Add New ${TYPE_CONFIG[currentType].partyLabel}</div>`;
  box.innerHTML=html; box.classList.add('active');
}
function pickParty(p){
  selectedParty=p;
  document.getElementById('partySearch').value=p.name;
  document.getElementById('partyId').value=p.id;
  document.getElementById('partyEmail').value=p.email||'';
  document.getElementById('partyPhone').value=p.phone||'';
  document.getElementById('partyGstin').value=p.gstin||'';
  document.getElementById('partySupplyType').value=p.supply_type==='interstate'?'Interstate (IGST)':'Intrastate (CGST+SGST)';
  document.getElementById('partyAddress').value=[p.address_line1,p.address_line2,p.city,p.state,p.pincode].filter(Boolean).join(', ');
  document.getElementById('partyResults').classList.remove('active');
  renderTotals();
}
function openPartyModal(prefill){
  document.getElementById('npName').value=prefill||'';
  document.getElementById('npErr').style.display='none';
  document.getElementById('partyModalTitle').textContent='Add New '+TYPE_CONFIG[currentType].partyLabel;
  document.getElementById('partyModal').classList.add('active');
}
async function saveNewParty(){
  const name=document.getElementById('npName').value.trim();
  const err=document.getElementById('npErr');
  if(!name){ err.textContent='Name is required.'; err.style.display='block'; return; }
  const kind=TYPE_CONFIG[currentType].partyKind;
  const path=kind==='customer'?'/customers':'/vendors';
  const body=kind==='customer'
    ? { customerName:name, email:document.getElementById('npEmail').value.trim()||null, phone:document.getElementById('npPhone').value.trim()||null, gstin:document.getElementById('npGstin').value.trim()||null, supplyType:document.getElementById('npSupplyType').value }
    : { vendorName:name, email:document.getElementById('npEmail').value.trim()||null, phone:document.getElementById('npPhone').value.trim()||null, gstin:document.getElementById('npGstin').value.trim()||null, supplyType:document.getElementById('npSupplyType').value };
  try{
    const created=await window.Api.post(path, body);
    allParties=null;
    pickParty({ id:created.id, name, email:body.email, phone:body.phone, gstin:body.gstin, supply_type:body.supplyType, kind });
    closeModal('partyModal');
  }catch(e){ err.textContent=e.message||'Could not create.'; err.style.display='block'; }
}

async function onItemSearch(){
  const q=this.value.trim().toLowerCase(); const box=document.getElementById('itemResults');
  if(!q){ box.classList.remove('active'); return; }
  try{
    // FIX: GET /inventory returns { items, transactions }, not a bare
    // array — calling .filter() directly on that object threw
    // immediately, which this function's own catch block silently
    // turned into "Could not load items" every single time. That's
    // the actual, confirmed root cause of item search never finding
    // anything (and, downstream, never being able to add an existing
    // item to an invoice at all).
    const { items }=await window.Api.get('/inventory');
    const matches=items.filter(i=>i.name.toLowerCase().includes(q)||(i.code||'').toLowerCase().includes(q)).slice(0,3);
    let html='<div class="autocomplete-items">'+matches.map(i=>`<div class="autocomplete-item" onclick='pickItem(${JSON.stringify(i).replace(/'/g,"&#39;")})'><strong>${escapeHtml(i.name)}</strong> (${escapeHtml(i.code)})<br><small>₹${i[TYPE_CONFIG[currentType].rateField]||0} | GST ${i.gst}% | ${escapeHtml(i.uom)}</small></div>`).join('')+'</div>';
    html+=`<div class="autocomplete-item add-new" onclick="openItemModal('${this.value.trim().replace(/'/g,"")}')">＋ Add New Item</div>`;
    box.innerHTML=html; box.classList.add('active');
  }catch(e){ box.innerHTML='<div class="autocomplete-item">Could not load items</div>'; box.classList.add('active'); }
}
function pickItem(item){
  const rateField=TYPE_CONFIG[currentType].rateField;
  lines.push({ itemId:item.id, code:item.code, description:item.name, uom:item.uom, qty:1, rate:Number(item[rateField])||0, gstRate:Number(item.gst)||0, hsn:item.hsn||null });
  renderLines();
  // Keep the "keep typing" spreadsheet feel — focus the fresh draft
  // row's item search immediately so the next item can be added
  // without reaching for the mouse.
  const nextInput = document.getElementById('itemSearch');
  if (nextInput) nextInput.focus();
}
function openItemModal(prefill){
  document.getElementById('niName').value=prefill||'';
  document.getElementById('niErr').style.display='none';
  document.getElementById('itemModal').classList.add('active');
}
async function saveNewItem(){
  const name=document.getElementById('niName').value.trim();
  const err=document.getElementById('niErr');
  if(!name){ err.textContent='Item name is required.'; err.style.display='block'; return; }
  const body={ name, uom:document.getElementById('niUom').value.trim()||'nos', gst:Number(document.getElementById('niGst').value)||0, hsn:document.getElementById('niHsn').value.trim()||null, saleRate:Number(document.getElementById('niSaleRate').value)||0, purchaseRate:Number(document.getElementById('niPurchaseRate').value)||0 };
  try{
    const created=await window.Api.post('/inventory', body);
    pickItem({ id:created.id, code:created.code, name, uom:body.uom, gst:body.gst, sale_rate:body.saleRate, purchase_rate:body.purchaseRate });
    closeModal('itemModal');
  }catch(e){ err.textContent=e.message||'Could not create item.'; err.style.display='block'; }
}

function renderLines(){
  const body=document.getElementById('linesBody');
  const confirmedRows = lines.map((l,idx)=>`<tr>
      <td>${escapeHtml(l.description)}</td><td>${escapeHtml(l.uom)}</td>
      <td><input type="number" min="0.001" step="0.001" value="${l.qty}" onchange="lines[${idx}].qty=Number(this.value)||0;updateLineAmount(${idx});renderTotals();"></td>
      <td><input type="number" min="0" step="0.01" value="${l.rate}" onchange="lines[${idx}].rate=Number(this.value)||0;updateLineAmount(${idx});renderTotals();"></td>
      <td><input type="number" min="0" step="0.01" value="${l.gstRate}" onchange="lines[${idx}].gstRate=Number(this.value)||0;renderTotals();"></td>
      <td id="lineAmt${idx}">₹${fmt(l.qty*l.rate)}</td>
      <td><span style="cursor:pointer;color:#c0392b;" onclick="lines.splice(${idx},1);renderLines();">✕</span></td>
    </tr>`).join('');
  // The always-present draft row — this IS the "add a line" mechanism
  // now, not a separate box below the table. Wrapped in the same
  // .autocomplete-container the party-name search already uses, so
  // the results dropdown positions and styles identically.
  const draftRow = `<tr>
      <td><div class="autocomplete-container">
        <input type="text" id="itemSearch" placeholder="Type an item name or code…" autocomplete="off">
        <div class="autocomplete-list" id="itemResults"></div>
      </div></td>
      <td colspan="5" style="color:#aaa;font-size:12px;">Select an item to add this line</td>
    </tr>`;
  body.innerHTML = confirmedRows + draftRow;
  renderTotals();
}
// FIX (invoice line amount stuck at ₹0.00 / stale after editing qty or
// rate): the Amount cell was only ever set once, at the moment a row
// was rendered — editing Qty/Rate afterward called renderTotals()
// (the bottom summary) but never touched this cell again. Targeting
// the cell by id and updating it directly avoids re-rendering the
// whole row (which would lose focus/cursor position mid-edit).
function updateLineAmount(idx){
  const cell=document.getElementById('lineAmt'+idx);
  if(cell) cell.textContent='₹'+fmt(lines[idx].qty*lines[idx].rate);
}
function fmt(n){ return (Number(n)||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function toggleDiscType(){
  discountType = document.getElementById('discPercentToggle').checked ? 'percent' : 'amount';
  renderTotals();
}

function renderTotals(){
  const gross=lines.reduce((s,l)=>s+l.qty*l.rate,0);
  const gstTotal=lines.reduce((s,l)=>s+(l.qty*l.rate*l.gstRate/100),0);
  const interstate=selectedParty && selectedParty.supply_type==='interstate';

  document.getElementById('tGross').textContent='₹'+fmt(gross);
  document.getElementById('rowCgst').style.display=(interstate||!selectedParty)?'none':'flex';
  document.getElementById('rowSgst').style.display=(interstate||!selectedParty)?'none':'flex';
  document.getElementById('rowIgst').style.display=interstate?'flex':'none';
  if(selectedParty && !interstate){ document.getElementById('tCgst').textContent='₹'+fmt(gstTotal/2); document.getElementById('tSgst').textContent='₹'+fmt(gstTotal/2); }
  else if(interstate){ document.getElementById('tIgst').textContent='₹'+fmt(gstTotal); }

  const grossTotal=gross+gstTotal;
  const discRaw=Number(document.getElementById('discValue').value)||0;
  const discAmount=discountType==='percent'?grossTotal*discRaw/100:discRaw;
  let subtotal=grossTotal-discAmount;

  // Round Off checkbox: when checked, round the net figure to the
  // nearest whole rupee (i.e. round off the decimal portion only —
  // this never changes anything but the paise). When unchecked, the
  // net total is shown exactly as calculated, to 2 decimals.
  const roundOffOn=document.getElementById('roundOffCheckbox').checked;
  let roundOff=0, net=subtotal;
  if(roundOffOn){ net=Math.round(subtotal); roundOff=net-subtotal; }
  else { net=Math.round(subtotal*100)/100; roundOff=0; }

  document.getElementById('tGrossTotal').textContent='₹'+fmt(grossTotal);
  document.getElementById('tDiscount').textContent='₹'+fmt(discAmount);
  document.getElementById('tRoundOff').textContent=(roundOff>=0?'+':'')+'₹'+fmt(roundOff);
  document.getElementById('tNet').textContent='₹'+fmt(net);
}

async function resolvePartyForSubmit(requiredKind){
  // FIX: selectedParty can be either a customer or a vendor (the
  // search box shows both combined — see ensurePartiesLoaded()), but
  // each invoice type needs a specific kind's real id: sales needs a
  // real customers.id, purchase needs a real vendors.id. Sending the
  // WRONG table's id as if it were the right one either fails the
  // foreign key outright, or — worse — could silently attach the
  // invoice to a completely unrelated party if the id numbers happen
  // to coincide between the two tables. This creates the missing
  // matching record first (mirroring the same name/email/phone/gstin)
  // so the invoice always references a real row of the correct kind.
  if(selectedParty.kind === requiredKind) return selectedParty.id;

  const path = requiredKind === 'customer' ? '/customers' : '/vendors';
  const body = requiredKind === 'customer'
    ? { customerName: selectedParty.name, email: selectedParty.email||null, phone: selectedParty.phone||null, gstin: selectedParty.gstin||null, supplyType: selectedParty.supply_type||'intrastate' }
    : { vendorName: selectedParty.name, email: selectedParty.email||null, phone: selectedParty.phone||null, gstin: selectedParty.gstin||null, supplyType: selectedParty.supply_type||'intrastate' };
  const created = await window.Api.post(path, body);
  allParties = null; // force reload next time so the new record shows up in search too
  return created.id;
}

async function submitInvoice(post){
  if(!currentType){ alert('Select an invoice type first.'); return; }
  if(!selectedParty){ alert('Select a '+TYPE_CONFIG[currentType].partyLabel.toLowerCase()+' first.'); return; }
  if(!lines.length){ alert('Add at least one item line.'); return; }
  if(currentType==='purchase' && !document.getElementById('vendorInvoiceNo').value.trim()){
    alert('Vendor Invoice Number is required for purchase invoices.'); return;
  }
  const cfg=TYPE_CONFIG[currentType];
  let partyId;
  try{
    partyId = await resolvePartyForSubmit(cfg.partyKind);
  }catch(e){
    document.getElementById('errorMsg').textContent = 'Could not link '+TYPE_CONFIG[currentType].partyLabel.toLowerCase()+': '+(e.message||'Unknown error');
    document.getElementById('errorMsg').style.display='block';
    return;
  }
  const body={
    [cfg.partyField]: partyId,
    invoiceDate: document.getElementById('invoiceDate').value,
    dueDate: document.getElementById('dueDate').value || null,
    noteDate: document.getElementById('invoiceDate').value,
    lines: lines.map(l=>({ description:l.description, qty:l.qty, rate:l.rate, gstRate:l.gstRate, hsn:l.hsn||null, itemId:l.itemId||null })),
    narration: document.getElementById('narration').value || null,
    projectId: document.getElementById('invoiceProject').value || null,
  };
  if(currentType==='purchase'){
    body.vendorInvoiceNo = document.getElementById('vendorInvoiceNo').value.trim();
  }
  try{
    const created = editId
      ? await window.Api.patch(cfg.endpoint+'/'+editId, body)
      : await window.Api.post(cfg.endpoint, body);
    if(post) await window.Api.post(cfg.endpoint+'/'+(editId||created.id)+'/post', {});
    document.getElementById('successMsg').textContent='✅ Invoice '+(post?'posted':'saved as draft')+' successfully!';
    document.getElementById('successMsg').style.display='block';
    setTimeout(()=>{ window.top.location.href='/invoices.html'; }, 1500);
  }catch(e){
    document.getElementById('errorMsg').textContent='❌ Could not save: '+(e.message||'Unknown error');
    document.getElementById('errorMsg').style.display='block';
  }
}
