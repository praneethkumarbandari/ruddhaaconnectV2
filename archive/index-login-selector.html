<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Home</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/cards.css">
  <link rel="stylesheet" href="/css/buttons.css">
  <link rel="stylesheet" href="/css/forms.css">
  <link rel="stylesheet" href="/css/tables.css">
  <link rel="stylesheet" href="/css/modals.css">
  <link rel="stylesheet" href="/css/utilities.css">
  <link rel="stylesheet" href="/css/responsive.css">

  <script>
// Preload theme from localStorage before CSS
(function(){
  try {
    const cached = localStorage.getItem('portalTheme');
    if(cached){
      const theme = JSON.parse(cached);
      if(theme.primary_color?.trim()){
        document.documentElement.style.setProperty('--primary-color', theme.primary_color.trim());
      }
      if(theme.secondary_color?.trim()){
        document.documentElement.style.setProperty('--secondary-color', theme.secondary_color.trim());
      }
      if(theme.background_color?.trim()){
        document.documentElement.style.setProperty('--background-color', theme.background_color.trim());
      }
      if(theme.font_family?.trim()){
        document.documentElement.style.setProperty('--font-family', theme.font_family.trim());
      }
    }
  } catch(e){
    // ignore preload errors
  }
})();
  </script>

  <style>
    :root{
      --primary-color:#1f6bff;
      --secondary-color:#dbe7ff;
      --background-color:#f5f7fb;
      --font-family:'Segoe UI',sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:var(--font-family);}
    body{
      background:var(--background-color);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      visibility:hidden; /* Added for theme preload */
    }
    .container{width:100%;max-width:1200px;min-height:700px;background:#fff;border-radius:20px;box-shadow:0 5px 25px rgba(0,0,0,0.08);overflow:hidden;display:flex;flex-direction:column;}
    .header{padding:25px 40px;}
    .logo{display:flex;align-items:center;gap:15px;}
    .logo img{width:50px;height:50px;object-fit:contain;display:none;}
    .logo-text{font-size:20px;color:#444;font-weight:600;}
    .main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
      background:radial-gradient(circle at bottom left,var(--secondary-color) 0%,transparent 40%),
                 radial-gradient(circle at bottom right,var(--secondary-color) 0%,transparent 40%);}
    .main h1{color:#222;margin-bottom:10px;}
    .main p{color:#777;margin-bottom:50px;}
    .card-container{display:flex;gap:30px;flex-wrap:wrap;justify-content:center;}
    .card{width:260px;background:white;border-radius:16px;padding:40px 25px;text-align:center;box-shadow:0 3px 15px rgba(0,0,0,.08);transition:.3s;cursor:pointer;}
    .card:hover{transform:translateY(-8px);}
    .icon-circle{width:80px;height:80px;border-radius:50%;background:var(--primary-color);color:white;display:flex;justify-content:center;align-items:center;margin:auto;margin-bottom:20px;font-size:34px;}
    .card h3{margin-bottom:10px;color:#222;}
    .card p{margin:0;color:#666;font-size:14px;line-height:22px;}
    .footer{border-top:1px solid #eee;padding:20px;text-align:center;}
    .footer a{text-decoration:none;color:#555;margin:0 20px;}
    .footer a:hover{color:var(--primary-color);}
    @media(max-width:768px){
      .card-container{flex-direction:column;}
      .container{min-height:100vh;border-radius:0;}
    }
  </style>
    </head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">
      <img id="companyLogo" alt="Company Logo">
      <div class="logo-text" id="companyName">Company Name</div>
    </div>
  </div>

  <div class="main">
    <h1>Welcome</h1>
    <p id="tagline">Please choose how you want to continue</p>
    <div class="card-container">
      <div class="card" onclick="location.href='business-login.html'">
        <div class="icon-circle"><i class="fa-solid fa-building"></i></div>
        <h3>Business Login</h3>
        <p>Login for business owners and team members</p>
      </div>
      <div class="card" onclick="location.href='customer-login.html'">
        <div class="icon-circle"><i class="fa-solid fa-user"></i></div>
        <h3>Customer Login</h3>
        <p>Login for customers to access portal services</p>
      </div>
    </div>
  </div>

  <div class="footer" id="footer">
    <!-- Links will be injected dynamically -->
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/js/supabase.js"></script>
<script>
const supabaseUrl = "https://ceutauofwiohvxzsqude.supabase.co";
const supabaseKey = "sb_publishable_cECTRlGyMD_6kT2qfpWCuA_5l8O08du";
const db = window.db;

async function loadTheme(){
  try {
    const { data, error } = await db
      .from("portal_config")
      .select("*")
      .limit(1)
      .single();

    if(error || !data){
      console.error("Portal Config Error", error);
      document.body.style.visibility = "visible";
      return;
    }

    // --- Colors & Font ---
    if(data.primary_color?.trim()){
      document.documentElement.style.setProperty('--primary-color', data.primary_color.trim());
    }
    if(data.secondary_color?.trim()){
      document.documentElement.style.setProperty('--secondary-color', data.secondary_color.trim());
    }
    if(data.background_color?.trim()){
      document.documentElement.style.setProperty('--background-color', data.background_color.trim());
    }
    if(data.font_family?.trim()){
      document.documentElement.style.setProperty('--font-family', data.font_family.trim());
    }

    // --- Company Name ---
    if(data.company_name?.trim()){
      document.getElementById("companyName").innerText = data.company_name.trim();
      document.title = data.company_name.trim();
    }

    // --- Tagline ---
    if(data.tagline?.trim()){
      document.getElementById("tagline").innerText = data.tagline.trim();
    }

    // --- Logo Handling ---
    const logo = document.getElementById("companyLogo");
    if(data.logo_path?.trim()){
      logo.src = data.logo_path.trim();
      logo.onload = () => logo.style.display = "block";
      logo.onerror = () => logo.style.display = "none";
    } else {
      logo.style.display = "none";
    }

    // --- Footer Links ---
    const footer = document.getElementById("footer");
    footer.innerHTML = ""; // clear existing

    const links = [];
    if(data.website?.trim()){
      const websiteLink = document.createElement("a");
      websiteLink.href = data.website.trim();
      websiteLink.target = "_blank";
      websiteLink.textContent = "About Us";
      links.push(websiteLink);
    }
    if(data.support_email?.trim()){
      const contactLink = document.createElement("a");
      contactLink.href = "mailto:" + data.support_email.trim();
      contactLink.textContent = "Contact Us";
      links.push(contactLink);
    }

    if(links.length === 0){
      footer.style.display = "none"; // hide entire footer
    } else {
      links.forEach((link, index) => {
        footer.appendChild(link);
        if(index < links.length - 1){
          const separator = document.createTextNode(" | ");
          footer.appendChild(separator);
        }
      });
      footer.style.display = "block";
    }

    // ✅ Cache theme and restore visibility
    localStorage.setItem('portalTheme', JSON.stringify(data));
    document.body.style.visibility = "visible";

  } catch(err){
    console.error("Theme Load Failed", err);
    document.body.style.visibility = "visible";
  }
}

document.addEventListener("DOMContentLoaded", loadTheme);
</script>

</html>
